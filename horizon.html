<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HORIZON — Mission Control HUD</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:24px}
:root{--bg:#0a0a0a;--card:#141312;--card-edge:#22201c;--gold:#E8C04A;--gold-dim:#9a7528;--orange:#FF6A1A;--green:#8fe89a;--cyan:#4dd0e1;--magenta:#ce93d8;--red:#ef5350;--text:#f0ede8;--text-dim:#b8b2a5;--text-deep:#6b6555;--font-head:'Bebas Neue',sans-serif;--font-display:'Share Tech Mono',monospace;--font-body:'Inter',sans-serif}
html{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);height:100%;overflow:hidden;position:relative}

/* CRT overlay */
.crt::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.15) 0px,rgba(0,0,0,.15) 1px,transparent 1px,transparent 3px);z-index:999;animation:crt-flicker .1s infinite}
@keyframes crt-flicker{0%,100%{opacity:1}50%{opacity:.97}}
.crt::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,.4) 100%);z-index:998}

@keyframes glow-pulse{0%,100%{opacity:.6}50%{opacity:.9}}

.scan-line{position:fixed;top:0;left:0;width:100%;height:2px;background:rgba(232,192,74,.08);z-index:997;pointer-events:none;animation:scan 4s linear infinite}
@keyframes scan{0%{top:0}100%{top:100%}}

.nav-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;background:rgba(10,10,10,.85);border-bottom:1px solid var(--card-edge);backdrop-filter:blur(8px)}
.nav-bar a{font-family:var(--font-display);font-size:.4rem;color:var(--text-deep);border:1px solid var(--card-edge);padding:.15rem .4rem;transition:all .1s;text-decoration:none}
.nav-bar a:hover{color:var(--gold);border-color:var(--gold-dim)}
.nav-bar .title{margin-left:auto;font-family:var(--font-display);font-size:.35rem;color:var(--text-deep);letter-spacing:.1em;text-transform:uppercase}
.nav-bar .status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:glow-pulse 2s infinite;margin-left:.3rem}

#starfield{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

.hud{position:fixed;top:2rem;left:0;right:0;bottom:0;z-index:1;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto auto auto;gap:4px;padding:4px;overflow:hidden}

.panel{background:rgba(20,19,18,.7);border:1px solid var(--card-edge);padding:.4rem;position:relative;overflow:hidden;backdrop-filter:blur(4px);min-height:0}
.panel-header{font-family:var(--font-display);font-size:.3rem;color:var(--text-deep);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.2rem;display:flex;align-items:center;gap:.3rem}
.panel-header .dot{width:4px;height:4px;border-radius:50%;display:inline-block}
.dot-green{background:var(--green);box-shadow:0 0 6px var(--green)}.dot-gold{background:var(--gold);box-shadow:0 0 6px var(--gold)}.dot-cyan{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}.dot-red{background:var(--red);box-shadow:0 0 6px var(--red)}

#radarCanvas{width:100%;height:120px;display:block}
.gauge-row{display:flex;gap:4px;height:100%}
.gauge-wrap{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-wrap canvas{width:100%;height:100%;display:block}
.gauge-label{font-family:var(--font-display);font-size:.28rem;color:var(--text-deep);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;text-align:center}
.gauge-value{font-family:var(--font-display);font-size:.65rem;color:var(--gold);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-shadow:0 0 10px rgba(232,192,74,.3);pointer-events:none;white-space:nowrap}
.gauge-unit{font-size:.25rem;color:var(--text-deep);display:block;text-align:center;margin-top:-2px}

#attitudeCanvas{width:100%;height:100%;display:block}
#compassCanvas{width:100%;height:30px;display:block}

.star-map{position:relative;min-height:0}
.star-map canvas{width:100%;height:100%;display:block}

.terminal-wrap{overflow:hidden;position:relative}
.terminal{font-family:var(--font-display);font-size:.32rem;color:var(--green);height:100%;overflow-y:auto;scrollbar-width:none;padding:.1rem;line-height:1.3;word-break:break-all}
.terminal::-webkit-scrollbar{display:none}
.terminal .line{opacity:0;animation:fade-in .3s forwards}
.terminal .warn{color:var(--gold)}.terminal .err{color:var(--red)}.terminal .info{color:var(--cyan)}.terminal .sys{color:var(--text-deep)}
@keyframes fade-in{to{opacity:1}}
.terminal .cursor{display:inline-block;width:6px;height:.35rem;background:var(--green);animation:blink .6s step-end infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes blink{50%{opacity:0}}

.clock-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%}
.clock-time{font-family:var(--font-display);font-size:1.8rem;color:var(--gold);letter-spacing:.08em;text-shadow:0 0 20px rgba(232,192,74,.2);line-height:1}
.clock-date{font-family:var(--font-display);font-size:.38rem;color:var(--text-deep);letter-spacing:.15em;text-transform:uppercase;margin-top:.15rem}
.clock-timer{font-family:var(--font-display);font-size:.35rem;color:var(--cyan);letter-spacing:.1em;margin-top:.1rem}

.data-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.data-item{display:flex;justify-content:space-between;padding:.05rem .1rem;border-bottom:1px solid rgba(34,32,28,.3);font-size:.32rem}
.data-item .label{color:var(--text-deep);font-family:var(--font-display);font-size:.28rem;text-transform:uppercase;letter-spacing:.06em}
.data-item .value{font-family:var(--font-display);color:var(--text);font-size:.3rem}
.data-item .value.gold{color:var(--gold)}.data-item .value.green{color:var(--green)}.data-item .value.cyan{color:var(--cyan)}.data-item .value.red{color:var(--red)}

.sys-grid{display:flex;flex-direction:column;gap:3px;padding:.1rem}
.sys-row{display:flex;align-items:center;gap:.25rem;font-size:.3rem}
.sys-row .led{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sys-row .led.green{background:var(--green);box-shadow:0 0 4px var(--green)}
.sys-row .led.gold{background:var(--gold);box-shadow:0 0 4px var(--gold)}
.sys-row .led.cyan{background:var(--cyan);box-shadow:0 0 4px var(--cyan)}
.sys-row .led.red{background:var(--red);box-shadow:0 0 4px var(--red)}
.sys-row .sname{color:var(--text-deep);font-family:var(--font-display);font-size:.28rem;letter-spacing:.04em;text-transform:uppercase;min-width:5rem}
.sys-row .sval{color:var(--text-dim);font-size:.28rem;margin-left:auto}

.weather-icon{font-size:1.5rem;text-align:center;line-height:1;margin-bottom:.1rem}
.weather-temp{font-family:var(--font-display);font-size:1.2rem;color:var(--gold);text-align:center;text-shadow:0 0 15px rgba(232,192,74,.15);line-height:1}
.weather-desc{font-size:.3rem;color:var(--text-dim);text-align:center;letter-spacing:.05em}
.weather-details{display:flex;justify-content:center;gap:.6rem;margin-top:.15rem;font-family:var(--font-display);font-size:.28rem;color:var(--text-deep)}

@keyframes glitch{0%,90%,100%{transform:translate(0)}92%{transform:translate(-2px,1px)}94%{transform:translate(2px,-1px)}96%{transform:translate(-1px,2px)}98%{transform:translate(1px,-2px)}}
.glitch{animation:glitch .3s infinite}

@media(max-width:700px){
  .hud{grid-template-columns:1fr 1fr;grid-template-rows:auto;gap:2px;padding:2px}
  .clock-time{font-size:1.2rem}
  .weather-icon{font-size:1rem}
}
</style>
</head>
<body class="crt">
<div class="scan-line"></div>

<canvas id="starfield"></canvas>

<nav class="nav-bar">
  <a href="index.html">← BACK</a>
  <span class="title">HORIZON · MISSION CONTROL</span>
  <span class="status-dot"></span>
</nav>

<div class="hud" id="hud">
  <!-- Radar -->
  <div class="panel" style="grid-row:1;grid-column:1">
    <div class="panel-header"><span class="dot dot-green"></span>RADAR</div>
    <canvas id="radarCanvas"></canvas>
  </div>

  <!-- Clock -->
  <div class="panel" style="grid-row:1;grid-column:2">
    <div class="panel-header"><span class="dot dot-gold"></span>MISSION TIME</div>
    <div class="clock-wrap">
      <div class="clock-time" id="clockTime">00:00:00</div>
      <div class="clock-date" id="clockDate">---</div>
      <div class="clock-timer" id="clockTimer">+00:00:00</div>
    </div>
  </div>

  <!-- Weather -->
  <div class="panel" style="grid-row:1;grid-column:3">
    <div class="panel-header"><span class="dot dot-cyan"></span>ATMOSPHERE</div>
    <div class="weather-icon" id="weatherIcon">☀️</div>
    <div class="weather-temp" id="weatherTemp">--°</div>
    <div class="weather-desc" id="weatherDesc">--</div>
    <div class="weather-details">
      <span id="weatherWind">--</span>
      <span id="weatherPressure">--</span>
      <span id="weatherHumidity">--</span>
    </div>
  </div>

  <!-- Attitude Indicator -->
  <div class="panel" style="grid-row:2;grid-column:1">
    <div class="panel-header"><span class="dot dot-cyan"></span>ATTITUDE</div>
    <canvas id="attitudeCanvas"></canvas>
  </div>

  <!-- Gauges -->
  <div class="panel" style="grid-row:2;grid-column:2">
    <div class="panel-header"><span class="dot dot-gold"></span>INSTRUMENTS</div>
    <div class="gauge-row">
      <div class="gauge-wrap">
        <canvas id="gaugeAlt"></canvas>
        <div class="gauge-value" id="altVal">0</div>
        <div class="gauge-label">ALT <span class="gauge-unit">FT</span></div>
      </div>
      <div class="gauge-wrap">
        <canvas id="gaugeSpd"></canvas>
        <div class="gauge-value" id="spdVal">0</div>
        <div class="gauge-label">SPD <span class="gauge-unit">KT</span></div>
      </div>
      <div class="gauge-wrap">
        <canvas id="gaugeVSI"></canvas>
        <div class="gauge-value" id="vsiVal">0</div>
        <div class="gauge-label">V/S <span class="gauge-unit">FPM</span></div>
      </div>
    </div>
  </div>

  <!-- Compass -->
  <div class="panel" style="grid-row:2;grid-column:3">
    <div class="panel-header"><span class="dot dot-green"></span>HEADING</div>
    <canvas id="compassCanvas"></canvas>
    <div style="text-align:center;font-family:var(--font-display);font-size:.5rem;color:var(--gold);letter-spacing:.15em;margin-top:2px" id="headingText">000°</div>
  </div>

  <!-- System Status -->
  <div class="panel" style="grid-row:3;grid-column:1">
    <div class="panel-header"><span class="dot dot-gold"></span>SYSTEMS</div>
    <div class="sys-grid" id="sysGrid"></div>
  </div>

  <!-- Data -->
  <div class="panel" style="grid-row:3;grid-column:2">
    <div class="panel-header"><span class="dot dot-cyan"></span>TELEMETRY</div>
    <div class="data-grid" id="telemetryGrid"></div>
  </div>

  <!-- Terminal -->
  <div class="panel terminal-wrap" style="grid-row:3;grid-column:3">
    <div class="panel-header"><span class="dot dot-green"></span>CONSOLE</div>
    <div class="terminal" id="terminal"></div>
  </div>
</div>

<script>
// ─── Starfield ───
const starCanvas = document.getElementById('starfield');
const sCtx = starCanvas.getContext('2d');
let stars = [];
function resizeStars(){
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
  stars = [];
  for(let i=0;i<200;i++){
    stars.push({
      x:Math.random()*starCanvas.width,
      y:Math.random()*starCanvas.height,
      r:Math.random()*1.5+.2,
      s:Math.random()*.3+.05,
      b:Math.random()*.5+.2
    });
  }
}
resizeStars();
window.addEventListener('resize',resizeStars);
let starTick = 0;
function drawStars(){
  sCtx.fillStyle='#0a0a0a';
  sCtx.fillRect(0,0,starCanvas.width,starCanvas.height);
  starTick+=.002;
  stars.forEach(s=>{
    s.y+=s.s;
    s.x+=Math.sin(starTick+s.y*0.01)*0.3;
    if(s.y>starCanvas.height){s.y=-5;s.x=Math.random()*starCanvas.width}
    const twinkle=.6+.4*Math.sin(starTick*3+s.x+s.y);
    sCtx.beginPath();
    sCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    sCtx.fillStyle=`rgba(240,237,232,${s.b*twinkle})`;
    sCtx.fill();
  });
}

// ─── Radar ───
const radCanvas = document.getElementById('radarCanvas');
const rCtx = radCanvas.getContext('2d');
let radW,radH,blips=[];
function resizeRadar(){
  radCanvas.width=radCanvas.clientWidth*2||320*2;
  radCanvas.height=radCanvas.clientHeight*2||120*2;
  radW=radCanvas.width;radH=radCanvas.height;
}
resizeRadar();
window.addEventListener('resize',resizeRadar);
for(let i=0;i<8;i++){
  blips.push({
    a:Math.random()*Math.PI*2,d:Math.random()*.6+.2,
    s:Math.random()*.008+.003,
    strength:.4+Math.random()*.6
  });
}
let radarAngle=0;
function drawRadar(){
  const cx=radW/2,cy=radH/2,r=Math.min(cx,cy)*.85;
  rCtx.fillStyle='rgba(10,10,10,.95)';
  rCtx.fillRect(0,0,radW,radH);

  for(let i=1;i<=3;i++){
    rCtx.beginPath();
    rCtx.arc(cx,cy,r*(i/3),0,Math.PI*2);
    rCtx.strokeStyle=`rgba(232,192,74,${.04+i*.03})`;
    rCtx.lineWidth=1;
    rCtx.stroke();
  }
  rCtx.beginPath();
  rCtx.moveTo(cx-r,cy);rCtx.lineTo(cx+r,cy);
  rCtx.moveTo(cx,cy-r);rCtx.lineTo(cx,cy+r);
  rCtx.strokeStyle='rgba(232,192,74,.06)';
  rCtx.lineWidth=1;
  rCtx.stroke();

  radarAngle+=.015;
  blips.forEach(b=>{
    b.a+=b.s+Math.sin(radarAngle*0.5)*0.002;
    if(b.a>Math.PI*2)b.a-=Math.PI*2;
    const bx=cx+Math.cos(b.a)*r*b.d;
    const by=cy+Math.sin(b.a)*r*b.d;
    rCtx.beginPath();
    rCtx.arc(bx,by,4,0,Math.PI*2);
    rCtx.fillStyle=`rgba(77,208,225,${b.strength*.15})`;
    rCtx.fill();
    rCtx.beginPath();
    rCtx.arc(bx,by,1.5,0,Math.PI*2);
    rCtx.fillStyle=`rgba(77,208,225,${b.strength*.7})`;
    rCtx.fill();
  });

  const sweepAngle=radarAngle % (Math.PI*2);
  rCtx.beginPath();
  rCtx.moveTo(cx,cy);
  rCtx.arc(cx,cy,r*1.05,sweepAngle-.3,sweepAngle);
  rCtx.closePath();
  const grad=rCtx.createRadialGradient(cx,cy,0,cx,cy,r*1.05);
  grad.addColorStop(0,'rgba(77,208,225,.08)');
  grad.addColorStop(1,'rgba(77,208,225,0)');
  rCtx.fillStyle=grad;
  rCtx.fill();

  rCtx.beginPath();
  rCtx.moveTo(cx,cy);
  rCtx.lineTo(cx+Math.cos(sweepAngle)*r*1.05,cy+Math.sin(sweepAngle)*r*1.05);
  rCtx.strokeStyle='rgba(77,208,225,.6)';
  rCtx.lineWidth=1.5;
  rCtx.stroke();

  rCtx.beginPath();
  rCtx.arc(cx,cy,2,0,Math.PI*2);
  rCtx.fillStyle='var(--green)';
  rCtx.fill();
}

// ─── Attitude Indicator ───
const attCanvas = document.getElementById('attitudeCanvas');
const aCtx = attCanvas.getContext('2d');
let attPitch=0,attRoll=0;
function resizeAtt(){
  attCanvas.width=attCanvas.clientWidth*2||200*2;
  attCanvas.height=attCanvas.clientHeight*2||120*2;
}
resizeAtt();
window.addEventListener('resize',resizeAtt);
function drawAttitude(){
  const w=attCanvas.width,h=attCanvas.height;
  const cx=w/2,cy=h/2,rad=Math.min(cx,cy)*.85;

  aCtx.save();
  aCtx.beginPath();
  aCtx.arc(cx,cy,rad,0,Math.PI*2);
  aCtx.clip();

  const pitchPx=attPitch*2.5;
  aCtx.translate(cx,cy);
  aCtx.rotate(attRoll);
  aCtx.translate(-cx,-cy);

  aCtx.fillStyle='rgba(10,20,40,.8)';
  aCtx.fillRect(0,0,w,h);
  aCtx.fillStyle='rgba(40,20,10,.6)';
  aCtx.fillRect(0,cy+pitchPx,w,h-cy-pitchPx);

  aCtx.beginPath();
  aCtx.moveTo(cx-rad-10,cy+pitchPx);
  aCtx.lineTo(cx+rad+10,cy+pitchPx);
  aCtx.strokeStyle='var(--gold)';
  aCtx.lineWidth=2;
  aCtx.stroke();

  for(let i=-20;i<=20;i+=5){
    if(i===0)continue;
    const py=cy+pitchPx+i*2.5;
    if(py<cy-rad||py>cy+rad)continue;
    const lw=Math.abs(i)<=10?rad*.3:rad*.15;
    aCtx.beginPath();
    aCtx.moveTo(cx-lw,py);
    aCtx.lineTo(cx+lw,py);
    aCtx.strokeStyle=i<0?'rgba(77,208,225,.4)':'rgba(139,90,43,.4)';
    aCtx.lineWidth=.7;
    aCtx.stroke();
  }
  aCtx.restore();

  aCtx.beginPath();
  aCtx.moveTo(cx-rad*.25,cy);
  aCtx.lineTo(cx-rad*.08,cy-8);
  aCtx.moveTo(cx-rad*.25,cy);
  aCtx.lineTo(cx-rad*.08,cy+8);
  aCtx.moveTo(cx+rad*.25,cy);
  aCtx.lineTo(cx+rad*.08,cy-8);
  aCtx.moveTo(cx+rad*.25,cy);
  aCtx.lineTo(cx+rad*.08,cy+8);
  aCtx.strokeStyle='var(--gold)';
  aCtx.lineWidth=1.5;
  aCtx.stroke();

  aCtx.beginPath();
  aCtx.arc(cx,cy,2,0,Math.PI*2);
  aCtx.fillStyle='var(--gold)';
  aCtx.fill();

  aCtx.beginPath();
  aCtx.arc(cx,cy,rad,0,Math.PI*2);
  aCtx.strokeStyle='rgba(232,192,74,.15)';
  aCtx.lineWidth=1;
  aCtx.stroke();
}

// ─── Gauges ───
function drawGauge(canvasId,value,maxVal,color){
  const canvas=document.getElementById(canvasId);
  canvas.width=canvas.clientWidth*2||80*2;
  canvas.height=canvas.clientHeight*2||100*2;
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height,cx=w/2,cy=h*.7;
  const rad=Math.min(cx,cy)*.75;

  ctx.clearRect(0,0,w,h);

  ctx.beginPath();
  ctx.arc(cx,cy,rad,.75*Math.PI,2.25*Math.PI);
  ctx.strokeStyle='rgba(34,32,28,.6)';
  ctx.lineWidth=6;
  ctx.lineCap='round';
  ctx.stroke();

  const valAngle=.75*Math.PI+(Math.min(value,maxVal)/maxVal)*1.5*Math.PI;
  ctx.beginPath();
  ctx.arc(cx,cy,rad,.75*Math.PI,Math.min(valAngle,2.25*Math.PI));
  ctx.strokeStyle=color||'var(--gold)';
  ctx.lineWidth=6;
  ctx.lineCap='round';
  ctx.shadowColor=color||'var(--gold)';
  ctx.shadowBlur=8;
  ctx.stroke();
  ctx.shadowBlur=0;

  for(let i=0;i<=10;i++){
    const a=.75*Math.PI+(i/10)*1.5*Math.PI;
    const inner=i%5===0?rad*.82:rad*.88;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*inner,cy+Math.sin(a)*inner);
    ctx.lineTo(cx+Math.cos(a)*rad*.93,cy+Math.sin(a)*rad*.93);
    ctx.strokeStyle=i%5===0?'rgba(232,192,74,.3)':'rgba(34,32,28,.5)';
    ctx.lineWidth=i%5===0?1.2:.6;
    ctx.stroke();
  }
}

// ─── Compass ───
const compCanvas = document.getElementById('compassCanvas');
const cCtx = compCanvas.getContext('2d');
let heading=0;
function resizeComp(){
  compCanvas.width=compCanvas.clientWidth*2||280*2;
  compCanvas.height=compCanvas.clientHeight*2||40*2;
}
resizeComp();
window.addEventListener('resize',resizeComp);
function drawCompass(){
  const w=compCanvas.width,h=compCanvas.height,cx=w/2,cy=h/2;
  cCtx.clearRect(0,0,w,h);

  const tickW=w*.7,step=tickW/32;
  const offset=(heading%360)/360*tickW;

  cCtx.save();
  cCtx.beginPath();
  cCtx.rect(0,0,w,h);
  cCtx.clip();

  const cardinals=['N','NE','E','SE','S','SW','W','NW'];
  for(let i=-16;i<=48;i++){
    const x=cx+(i*step)-offset;
    const deg=(i*11.25+360)%360;
    const isCard=deg%90===0;
    const isHalf=deg%45===0;
    const isTen=deg%10===0;
    const hh=isCard?h*.6:isHalf?h*.45:isTen?h*.35:h*.2;

    cCtx.beginPath();
    cCtx.moveTo(x,cy-h/2);
    cCtx.lineTo(x,cy-h/2+hh);
    cCtx.strokeStyle=isCard?'rgba(232,192,74,.5)':'rgba(34,32,28,.4)';
    cCtx.lineWidth=isCard?1.2:.5;
    cCtx.stroke();

    if(isCard||isHalf){
      const idx=Math.round(deg/45)%8;
      cCtx.fillStyle=isCard?'var(--gold)':'var(--text-deep)';
      cCtx.font='.3rem Share Tech Mono';
      cCtx.textAlign='center';
      cCtx.fillText(isCard?cardinals[idx]:deg+'°',x,cy-h/2+hh+.3);
    }
  }
  cCtx.restore();

  cCtx.beginPath();
  cCtx.moveTo(cx,cy-h/2);
  cCtx.lineTo(cx-6,cy-h/2+10);
  cCtx.lineTo(cx+6,cy-h/2+10);
  cCtx.closePath();
  cCtx.fillStyle='var(--gold)';
  cCtx.fill();
}

// ─── Clock ───
let missionStart=Date.now();
function updateClock(){
  const now=new Date();
  const opts={weekday:'short',month:'short',day:'numeric',year:'numeric'};
  document.getElementById('clockTime').textContent=now.toLocaleTimeString('en-US',{hour12:false});
  document.getElementById('clockDate').textContent=now.toLocaleDateString('en-US',opts).toUpperCase();

  const elapsed=Math.floor((now-missionStart)/1000);
  const h=String(Math.floor(elapsed/3600)).padStart(2,'0');
  const m=String(Math.floor((elapsed%3600)/60)).padStart(2,'0');
  const s=String(elapsed%60).padStart(2,'0');
  document.getElementById('clockTimer').textContent=`+${h}:${m}:${s}`;
}

function addTermLine(){
  if(!termRunning||termIdx>=termLines.length){termRunning=false;return}

  div.textContent=`[${l.t}] ${l.msg}`;
  termEl.appendChild(div);
  termEl.scrollTop=termEl.scrollHeight;

}

// ─── Simulated instruments ───
let alt=35000,spd=452,vsi=0,hdg=274;
let altT=35000,spdT=452,vsiT=0,hdgT=274;

function simInstruments(){
  altT+=Math.sin(Date.now()*0.0003)*5;
  altT=Math.max(33000,Math.min(37000,altT));
  spdT+=Math.sin(Date.now()*0.0005)*2;
  spdT=Math.max(430,Math.min(480,spdT));
  vsiT=Math.sin(Date.now()*0.0008)*200;
  hdgT+=Math.sin(Date.now()*0.0002)*.3;
  hdgT=(hdgT+360)%360;

  alt+=(altT-alt)*0.02;
  spd+=(spdT-spd)*0.02;
  vsi+=(vsiT-vsi)*0.02;
  hdg+=(hdgT-hdg)*0.02;
  hdg=(hdg+360)%360;

  attPitch+=(Math.sin(Date.now()*0.0004)*3-attPitch)*0.02;
  attRoll+=(Math.sin(Date.now()*0.0003)*4-attRoll)*0.02;

  document.getElementById('altVal').textContent=Math.round(alt);
  document.getElementById('spdVal').textContent=Math.round(spd);
  document.getElementById('vsiVal').textContent=(vsi>0?'+':'')+Math.round(vsi);
  document.getElementById('headingText').textContent=String(Math.round(hdg)).padStart(3,'0')+'°';

  telGrid.children[0].querySelector('.value').textContent='FL'+Math.round(alt/100)*10;
  telGrid.children[1].querySelector('.value').textContent=Math.round(spd)+' KT';
  telGrid.children[2].querySelector('.value').textContent=(spd/580).toFixed(2);
  telGrid.children[3].querySelector('.value').textContent=(vsi>0?'+':'')+Math.round(vsi)+' FPM';
  telGrid.children[4].querySelector('.value').textContent=Math.round(hdg)+'°';
  telGrid.children[5].querySelector('.value').textContent=Math.round(hdg-3+Math.sin(Date.now()*0.001)*2)+'°';
}

// ─── Real weather ───
function fetchWeather(){
  fetch('https://api.open-meteo.com/v1/forecast?latitude=45.42&longitude=-75.69&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,pressure_msl')
    .then(r=>r.json())
    .then(d=>{
      const c=d.current;
      const codes={0:'☀️',1:'☀️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'❄️',73:'❄️',75:'❄️',80:'🌦️',81:'🌧️',82:'🌧️',95:'⛈️'};
      const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
      const wi=Math.round(c.wind_direction_10m/22.5)%16;
      document.getElementById('weatherIcon').textContent=codes[c.weather_code]||'🌤️';
      document.getElementById('weatherTemp').textContent=Math.round(c.temperature_2m)+'°';
      document.getElementById('weatherDesc').textContent=c.weather_code<=3?'Fair':'Precip';
      document.getElementById('weatherWind').textContent=dirs[wi]+' '+Math.round(c.wind_speed_10m)+' KT';
      document.getElementById('weatherPressure').textContent=Math.round(c.pressure_msl)+' hPa';
      document.getElementById('weatherHumidity').textContent=c.relative_humidity_2m+'%';
    })
    .catch(()=>{});
}
fetchWeather();
setInterval(fetchWeather,300000);

// ─── Main loop ───
function animate(){
  drawStars();
  drawRadar();
  drawCompass();
  drawAttitude();
  drawGauge('gaugeAlt',alt,50000,'var(--gold)');
  drawGauge('gaugeSpd',spd,600,'var(--cyan)');
  drawGauge('gaugeVSI',vsi+2000,4000,'var(--green)');
  simInstruments();
  updateClock();
  requestAnimationFrame(animate);
}
animate();
</script>
