<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Airplane Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--card:#141312;--card-edge:#22201c;--gold:#E8C04A;--gold-dim:#9a7528;--orange:#FF6A1A;--text:#f0ede8;--text-dim:#b8b2a5;--text-deep:#6b6555;--font-head:'Bebas Neue',sans-serif;--font-display:'Share Tech Mono',monospace;--font-body:'Inter',sans-serif}
html{height:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100%;-webkit-tap-highlight-color:transparent}
a{color:var(--gold);text-decoration:none}
a:hover{color:var(--orange)}
.nav-bar{display:flex;align-items:center;gap:.5rem;max-width:720px;margin:0 auto;padding:.75rem .5rem 0}
.nav-bar a{font-family:var(--font-display);font-size:.45rem;color:var(--text-deep);border:1px solid var(--card-edge);padding:.2rem .5rem;transition:all .1s}
.nav-bar a:hover{color:var(--gold);border-color:var(--gold-dim)}
.nav-bar .title{margin-left:auto;font-family:var(--font-display);font-size:.4rem;color:var(--text-deep);letter-spacing:.05em}
.page{max-width:720px;margin:0 auto;padding:2rem .5rem 4rem;text-align:center}
.placeholder-icon{font-size:3rem;margin-bottom:1rem;color:var(--text-deep)}
.page h2{font-family:var(--font-head);font-size:1.2rem;color:var(--text);letter-spacing:.1em;margin-bottom:.5rem}
.page p{font-size:.65rem;color:var(--text-dim);max-width:400px;margin:0 auto;line-height:1.6}
.tag{font-family:var(--font-display);font-size:.45rem;color:var(--gold);border:1px solid var(--gold-dim);padding:.15rem .4rem;display:inline-block;margin-bottom:1rem;letter-spacing:.06em}
</style>
</head>
<body>
<div class="nav-bar">
  <a href="index.html">← BACK</a>
  <span class="title">Airplane Tracker</span>
</div>
<div class="page">
  <div class="placeholder-icon">✈️</div>
  <div class="tag">IN PROGRESS</div>
  <h2>Airplane Tracker</h2>
  <p>Live flight radar with route visualization, aircraft tracking, and airport information overlay. Coming soon.</p>
</div>
</body>
</html>
