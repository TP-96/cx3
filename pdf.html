<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PDF Viewer & Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--card:#141312;--card-edge:#22201c;--card-hover:#1c1a16;--gold:#E8C04A;--gold-dim:#9a7528;--orange:#FF6A1A;--green:#8fe89a;--text:#f0ede8;--text-dim:#b8b2a5;--text-deep:#6b6555;--font-head:'Bebas Neue',sans-serif;--font-display:'Share Tech Mono',monospace;--font-body:'Inter',sans-serif}
html{height:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100%;-webkit-tap-highlight-color:transparent}
a{color:var(--gold);text-decoration:none}a:hover{color:var(--orange)}
.nav-bar{display:flex;align-items:center;gap:.5rem;max-width:420px;margin:0 auto;padding:.75rem .5rem 0}
.nav-bar a{font-family:var(--font-display);font-size:.45rem;color:var(--text-deep);border:1px solid var(--card-edge);padding:.2rem .5rem;transition:all .1s}
.nav-bar a:hover{color:var(--gold);border-color:var(--gold-dim)}
.nav-bar .title{margin-left:auto;font-family:var(--font-display);font-size:.4rem;color:var(--text-deep);letter-spacing:.05em}
.wrap{max-width:1200px;margin:0 auto;padding:1rem .5rem 2rem}

/* Drop zone */
.dropzone{margin:0 auto;max-width:500px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px dashed var(--card-edge);padding:3rem 1rem;cursor:pointer;transition:all .12s;text-align:center;min-height:260px;border-radius:4px}
.dropzone:hover{border-color:var(--gold-dim);background:rgba(232,192,74,.02)}
.dropzone.dragover{border-color:var(--gold);background:rgba(232,192,74,.05)}
.dropzone-icon{font-size:2.5rem;margin-bottom:.5rem;color:var(--text-deep);opacity:.5}
.dropzone-text{font-family:var(--font-display);font-size:.6rem;color:var(--text-deep);letter-spacing:.06em}
.dropzone-sub{font-size:.45rem;color:var(--text-dim);margin-top:.25rem}
.dropzone .hint{font-family:var(--font-display);font-size:.35rem;color:var(--text-deep);margin-top:.5rem;letter-spacing:.04em}

/* Toolbar */
.toolbar{display:none;gap:.25rem;padding:.35rem .5rem;background:var(--card);border:1px solid var(--card-edge);align-items:center;flex-wrap:wrap;border-radius:4px 4px 0 0}
.toolbar.show{display:flex}
.tool-group{display:flex;gap:.15rem;align-items:center;padding:0 .25rem;border-right:1px solid var(--card-edge)}
.tool-group:last-child{border-right:none}
.toolbar button{font-family:var(--font-display);font-size:.35rem;padding:.25rem .45rem;background:transparent;border:1px solid transparent;color:var(--text-dim);cursor:pointer;transition:all .08s;border-radius:2px;touch-action:manipulation;line-height:1}
.toolbar button:hover{color:var(--gold);border-color:var(--gold-dim)}
.toolbar button.active{color:var(--gold);border-color:var(--gold-dim);background:rgba(232,192,74,.06)}
.toolbar .sep{width:1px;height:1.2rem;background:var(--card-edge);margin:0 .15rem;display:inline-block;flex-shrink:0}
.toolbar .pg-label{font-family:var(--font-display);font-size:.35rem;color:var(--text-deep);padding:0 .15rem}
.toolbar .pg-input{width:2.2rem;background:transparent;border:1px solid var(--card-edge);color:var(--text);font-family:var(--font-display);font-size:.35rem;padding:.15rem .25rem;text-align:center;border-radius:2px}
.toolbar .pg-input:focus{border-color:var(--gold-dim);outline:none}
.toolbar .pg-total{font-family:var(--font-display);font-size:.32rem;color:var(--text-deep)}

/* Zoom control */
.zoom-group{display:flex;align-items:center;gap:.1rem}
.zoom-group .zoom-pct{font-family:var(--font-display);font-size:.35rem;color:var(--text);min-width:2.8rem;text-align:center;cursor:pointer;padding:.15rem .3rem;border:1px solid var(--card-edge);border-radius:2px;user-select:none}
.zoom-group .zoom-pct:hover{border-color:var(--gold-dim)}
.zoom-dropdown{position:relative;display:inline-block}
.zoom-menu{display:none;position:absolute;top:100%;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--card-edge);z-index:100;min-width:6rem;border-radius:3px;padding:.15rem 0;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.zoom-menu.show{display:block}
.zoom-menu button{display:block;width:100%;text-align:right;font-family:var(--font-display);font-size:.35rem;color:var(--text-dim);background:transparent;border:none;padding:.25rem .6rem;cursor:pointer;transition:all .06s}
.zoom-menu button:hover{color:var(--gold);background:rgba(232,192,74,.06)}
.zoom-menu button.fit-type{color:var(--gold);font-size:.32rem;letter-spacing:.04em;text-align:center;border-top:1px solid var(--card-edge);margin-top:.1rem;padding-top:.3rem}

/* Color swatches */
.toolbar .color-swatch{width:1rem;height:1rem;border-radius:50%;border:2px solid var(--card-edge);cursor:pointer;transition:all .08s;display:inline-block;vertical-align:middle;flex-shrink:0}
.toolbar .color-swatch:hover{border-color:var(--gold-dim)}
.toolbar .color-swatch.active{border-color:var(--gold)}
.toolbar select{background:transparent;border:1px solid var(--card-edge);color:var(--text);font-family:var(--font-display);font-size:.35rem;padding:.2rem .3rem;border-radius:2px;cursor:pointer}
.toolbar select:focus{outline:none;border-color:var(--gold-dim)}
.toolbar .size-slider{width:50px;accent-color:var(--gold);cursor:pointer}

/* Viewer — now scrollable like Acrobat */
.viewer{position:relative;background:#1a1a1a;border:1px solid var(--card-edge);min-height:450px;overflow:auto;display:none;border-radius:0 0 4px 4px}
.viewer.show{display:block}
.viewer .page-container{position:relative;margin:1.5rem auto;overflow:hidden;box-shadow:0 2px 30px rgba(0,0,0,.6);background:#fff}
.viewer canvas{display:block}
.viewer .annot-canvas{position:absolute;top:0;left:0;cursor:grab;touch-action:none}
.viewer .annot-canvas.mode-pen{cursor:crosshair}
.viewer .annot-canvas.mode-text{cursor:text}
.viewer .annot-canvas.mode-highlight{cursor:copy}
.viewer .annot-canvas.mode-erase{cursor:not-allowed}
.viewer .annot-canvas.mode-pan{cursor:grab}
.viewer .annot-canvas.mode-pan:active{cursor:grabbing}

/* Loading */
.loading{display:none;text-align:center;padding:2rem;font-family:var(--font-display);font-size:.5rem;color:var(--text-deep);letter-spacing:.1em}
.loading.show{display:block}
.spinner{display:inline-block;width:1.2rem;height:1.2rem;border:2px solid var(--card-edge);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;margin-bottom:.5rem}
@keyframes spin{to{transform:rotate(360deg)}}

/* Status bar */
.status-bar{display:none;padding:.3rem .5rem;font-family:var(--font-display);font-size:.32rem;color:var(--text-deep);background:var(--card);border:1px solid var(--card-edge);border-top:none;justify-content:space-between;border-radius:0 0 4px 4px}
.status-bar.show{display:flex}
.status-bar .file-name{color:var(--text-dim)}
.status-bar .page-info{color:var(--text-deep)}

/* Empty state */
.empty-state{max-width:500px;margin:2rem auto;text-align:center;padding:1rem;display:none}
.empty-state .icon{font-size:2rem;color:var(--text-deep);opacity:.3;margin-bottom:.5rem}
.empty-state .txt{font-family:var(--font-display);font-size:.45rem;color:var(--text-deep)}

@media(max-width:600px){
  .toolbar{font-size:.3rem;padding:.25rem}
  .toolbar button{font-size:.3rem;padding:.2rem .35rem}
  .toolbar .pg-input{width:1.8rem;font-size:.3rem}
  .toolbar select{font-size:.3rem}
  .wrap{padding:.5rem .25rem}
  .viewer{min-height:300px}
  .zoom-group .zoom-pct{min-width:2.2rem;font-size:.3rem}
  .zoom-menu{min-width:5rem}
}
</style>
</head>
<body>
<div class="nav-bar">
  <a href="index.html">← BACK</a>
  <span class="title">PDF VIEWER & EDITOR</span>
</div>
<div class="wrap">
  <!-- Drop zone -->
  <div class="dropzone" id="dropzone">
    <div class="dropzone-icon">📄</div>
    <div class="dropzone-text">DROP A PDF HERE</div>
    <div class="dropzone-sub">or click to browse</div>
    <div class="hint">Supports multi-page PDFs up to 50MB</div>
  </div>
  <input type="file" id="fileInput" accept=".pdf,application/pdf" style="display:none">

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>LOADING PDF...</div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <div class="tool-group">
      <button id="btnOpen" title="Open new PDF">📂</button>
      <button id="btnSave" title="Download edited PDF">💾</button>
      <button id="btnPrint" title="Print">🖨️</button>
    </div>
    <span class="sep"></span>
    <div class="tool-group">
      <button id="btnPrev" title="Previous page">◀</button>
      <span class="pg-label">PG</span>
      <input class="pg-input" id="pageInput" value="1" type="number" min="1">
      <span class="pg-total" id="pageTotal">/ 1</span>
      <button id="btnNext" title="Next page">▶</button>
    </div>
    <span class="sep"></span>
    <div class="tool-group zoom-group">
      <button id="btnZoomOut" title="Zoom out">🔍−</button>
      <div class="zoom-dropdown">
        <span class="zoom-pct" id="zoomPctDisplay" title="Click for zoom presets">100%</span>
        <div class="zoom-menu" id="zoomMenu">
          <button data-zoom="400">400%</button>
          <button data-zoom="200">200%</button>
          <button data-zoom="150">150%</button>
          <button data-zoom="125">125%</button>
          <button data-zoom="100">100%</button>
          <button data-zoom="75">75%</button>
          <button data-zoom="50">50%</button>
          <button data-zoom="fitw" class="fit-type">▬ Fit Width</button>
          <button data-zoom="fitp" class="fit-type">▭ Fit Page</button>
        </div>
      </div>
      <button id="btnZoomIn" title="Zoom in">🔍+</button>
    </div>
    <span class="sep"></span>
    <div class="tool-group" id="toolsGroup">
      <button id="toolPan" title="Pan" class="active" data-tool="pan">✋</button>
      <button id="toolPen" title="Draw" data-tool="pen">✏️</button>
      <button id="toolHighlight" title="Highlight" data-tool="highlight">🖍️</button>
      <button id="toolText" title="Add text" data-tool="text">🔤</button>
      <button id="toolErase" title="Eraser" data-tool="erase">🧹</button>
    </div>
    <span class="sep"></span>
    <div class="tool-group">
      <span class="color-swatch active" data-color="#E8C04A" style="background:#E8C04A"></span>
      <span class="color-swatch" data-color="#FF6A1A" style="background:#FF6A1A"></span>
      <span class="color-swatch" data-color="#8fe89a" style="background:#8fe89a"></span>
      <span class="color-swatch" data-color="#60a5fa" style="background:#60a5fa"></span>
      <span class="color-swatch" data-color="#f472b6" style="background:#f472b6"></span>
      <span class="color-swatch" data-color="#ffffff" style="background:#ffffff"></span>
      <input type="color" id="colorPicker" value="#E8C04A" style="width:1rem;height:1rem;padding:0;border:1px solid var(--card-edge);cursor:pointer;background:none;border-radius:50%">
    </div>
    <span class="sep"></span>
    <div class="tool-group">
      <input type="range" class="size-slider" id="sizeSlider" min="1" max="20" value="3">
      <span style="font-family:var(--font-display);font-size:.32rem;color:var(--text-deep);min-width:1.5rem" id="sizeLabel">3px</span>
    </div>
  </div>

  <!-- Viewer -->
  <div class="viewer" id="viewer">
    <div class="page-container" id="pageContainer">
      <canvas id="pdfCanvas"></canvas>
      <canvas id="annotCanvas"></canvas>
    </div>
  </div>

  <!-- Status bar -->
  <div class="status-bar" id="statusBar">
    <span class="file-name" id="fileName">No file</span>
    <span class="page-info" id="pageInfo">—</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ===== State =====
let pdfDoc = null;
let pdfData = null;
let currentPage = 1;
let totalPages = 1;
let scale = 1.5;
let baseViewportWidth = 0;   // native page width at scale=1
let baseViewportHeight = 0;  // native page height at scale=1
let fileName = '';
let annotations = [];
let currentTool = 'pan';
let currentColor = '#E8C04A';
let currentSize = 3;
let isDrawing = false;
let lastX = 0, lastY = 0;
let textInput = null;
let dragStart = null;
let isPanning = false;
let panOffsetX = 0, panOffsetY = 0;
let zoomMenuOpen = false;
let renderPending = false;

const $ = id => document.getElementById(id);

// ===== Drop Zone =====
const dz = $('dropzone');
const fileInput = $('fileInput');
dz.addEventListener('click', () => fileInput.click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover') });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') loadPDF(f);
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadPDF(e.target.files[0]);
});

// ===== Load PDF =====
function loadPDF(file) {
  fileName = file.name;
  console.log('loadPDF:', file.name, file.size);
  $('loading').classList.add('show');
  dz.style.display = 'none';
  const reader = new FileReader();
  reader.onload = function(e) {
    console.log('FileReader complete:', e.target.result.byteLength, 'bytes');
    const data = new Uint8Array(e.target.result);
    pdfData = data;
    pdfjsLib.getDocument({ data }).promise.then(doc => {
      console.log('pdfDoc loaded:', doc.numPages, 'pages');
      pdfDoc = doc;
      totalPages = doc.numPages;
      currentPage = 1;
      annotations = [];
      $('pageTotal').textContent = '/ ' + totalPages;
      $('pageInput').value = 1;
      $('viewer').classList.add('show');
      $('toolbar').classList.add('show');
      $('statusBar').classList.add('show');
      $('fileName').textContent = fileName;
      $('pageInfo').textContent = 'Page 1 of ' + totalPages;
      $('loading').classList.remove('show');

      // Get base viewport at scale=1 for fit calculations
      pdfDoc.getPage(1).then(page => {
        const vp = page.getViewport({ scale: 1 });
        baseViewportWidth = vp.width;
        baseViewportHeight = vp.height;
        console.log('Base viewport:', baseViewportWidth, 'x', baseViewportHeight);
        // Do initial fit-to-width
        fitToWidth();
      }).catch(err => {
        console.error('getPage error:', err);
      });
    }).catch(err => {
      $('loading').classList.remove('show');
      dz.style.display = 'flex';
      console.error('Failed to load PDF:', err.message);
    });
  };
  reader.onerror = function(e) {
    console.error('FileReader error:', e);
  };
  reader.readAsArrayBuffer(file);
}

// ===== Render Page =====
function renderPage(pageNum) {
  if (!pdfDoc || renderPending) return;
  renderPending = true;
  pdfDoc.getPage(pageNum).then(page => {
    const vp = page.getViewport({ scale });
    const canvas = $('pdfCanvas');
    const annotCanvas = $('annotCanvas');
    const container = $('pageContainer');
    canvas.width = vp.width;
    canvas.height = vp.height;
    annotCanvas.width = vp.width;
    annotCanvas.height = vp.height;
    container.style.width = vp.width + 'px';
    container.style.height = vp.height + 'px';

    const ctx = canvas.getContext('2d');
    const renderCtx = { canvasContext: ctx, viewport: vp };
    return page.render(renderCtx).promise;
  }).then(() => {
    redrawAnnotations();
    $('pageInput').value = pageNum;
    $('pageInfo').textContent = 'Page ' + pageNum + ' of ' + totalPages;
    currentPage = pageNum;
    renderPending = false;
  }).catch(() => {
    renderPending = false;
  });
}

// Convert screen coordinates → native PDF coordinates
function toNative(pos) {
  return { x: pos.x / scale, y: pos.y / scale };
}
// Convert native PDF coordinates → canvas coordinates
function toCanvas(native) {
  return { x: native.x * scale, y: native.y * scale };
}

// ===== Zoom =====
function updateZoomDisplay() {
  const pct = Math.round(scale * 100);
  $('zoomPctDisplay').textContent = pct + '%';
}

function zoomIn() { scale = Math.min(5, +(scale * 1.25).toFixed(2)); updateZoomDisplay(); renderPage(currentPage); }
function zoomOut() { scale = Math.max(0.25, +(scale / 1.25).toFixed(2)); updateZoomDisplay(); renderPage(currentPage); }
function zoomTo(s) {
  scale = Math.max(0.25, Math.min(5, s));
  updateZoomDisplay();
  renderPage(currentPage);
}

// Fit to width: scale so page width fills the viewer container width
function fitToWidth() {
  const viewer = $('viewer');
  const availW = viewer.clientWidth - 32; // 2 × 1rem margin
  if (baseViewportWidth <= 0) return;
  const newScale = +(availW / baseViewportWidth).toFixed(2);
  zoomTo(Math.max(0.25, Math.min(5, newScale)));
}

// Fit to page: scale so entire page fits in the viewer
function fitToPage() {
  const viewer = $('viewer');
  const availW = viewer.clientWidth - 32;
  const availH = viewer.clientHeight - 32;
  if (baseViewportWidth <= 0 || baseViewportHeight <= 0) return;
  const sW = availW / baseViewportWidth;
  const sH = availH / baseViewportHeight;
  zoomTo(Math.max(0.25, Math.min(5, +(Math.min(sW, sH)).toFixed(2))));
}

$('btnZoomIn').addEventListener('click', zoomIn);
$('btnZoomOut').addEventListener('click', zoomOut);

// Zoom dropdown
const zoomPctDisplay = $('zoomPctDisplay');
const zoomMenu = $('zoomMenu');
zoomPctDisplay.addEventListener('click', e => {
  e.stopPropagation();
  zoomMenuOpen = !zoomMenuOpen;
  zoomMenu.classList.toggle('show', zoomMenuOpen);
});
document.addEventListener('click', () => {
  zoomMenu.classList.remove('show');
  zoomMenuOpen = false;
});
zoomMenu.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    const val = btn.dataset.zoom;
    if (val === 'fitw') { fitToWidth(); }
    else if (val === 'fitp') { fitToPage(); }
    else { zoomTo(parseInt(val) / 100); }
    zoomMenu.classList.remove('show');
    zoomMenuOpen = false;
  });
});

// Ctrl+Scroll zoom — like Acrobat
$('viewer').addEventListener('wheel', e => {
  if (!pdfDoc) return;
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.08 : 0.08;
    const newScale = +(scale * (1 + delta)).toFixed(2);
    zoomTo(newScale);
  }
}, { passive: false });

// ===== Fit on window resize =====
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (pdfDoc) fitToWidth();
  }, 200);
});

// ===== Page Navigation =====
$('btnPrev').addEventListener('click', () => { zoomMenu.classList.remove('show'); zoomMenuOpen = false; if (currentPage > 1) { panOffsetX = 0; panOffsetY = 0; renderPage(currentPage - 1); } });
$('btnNext').addEventListener('click', () => { zoomMenu.classList.remove('show'); zoomMenuOpen = false; if (currentPage < totalPages) { panOffsetX = 0; panOffsetY = 0; renderPage(currentPage + 1); } });
$('pageInput').addEventListener('change', function() {
  let p = parseInt(this.value);
  if (isNaN(p) || p < 1) p = 1;
  if (p > totalPages) p = totalPages;
  if (p !== currentPage) { panOffsetX = 0; panOffsetY = 0; renderPage(p); }
  else this.value = currentPage;
});
document.addEventListener('keydown', e => {
  if (!pdfDoc) return;
  if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); panOffsetX = 0; panOffsetY = 0; if (currentPage > 1) renderPage(currentPage - 1); }
  if (e.key === 'ArrowRight' || e.key === 'PageDown') { e.preventDefault(); panOffsetX = 0; panOffsetY = 0; if (currentPage < totalPages) renderPage(currentPage + 1); }
});

// ===== Tools =====
document.querySelectorAll('#toolsGroup button[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#toolsGroup button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTool = btn.dataset.tool;
    const ac = $('annotCanvas');
    ac.className = 'annot-canvas mode-' + currentTool;
  });
});

// ===== Color =====
document.querySelectorAll('.color-swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    currentColor = sw.dataset.color;
    $('colorPicker').value = currentColor;
  });
});
$('colorPicker').addEventListener('input', function() {
  currentColor = this.value;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
});

// ===== Size =====
$('sizeSlider').addEventListener('input', function() {
  currentSize = parseInt(this.value);
  $('sizeLabel').textContent = currentSize + 'px';
});

// ===== Annotations =====
function getPageAnnotations() {
  return annotations.filter(a => a.page === currentPage);
}

function redrawAnnotations() {
  const ac = $('annotCanvas');
  const ctx = ac.getContext('2d');
  ctx.clearRect(0, 0, ac.width, ac.height);
  const pageAnnots = getPageAnnotations();
  pageAnnots.forEach(a => {
    if (a.type === 'path') {
      ctx.beginPath();
      ctx.strokeStyle = a.color;
      ctx.lineWidth = a.size;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      a.points.forEach((p, i) => {
        const cp = toCanvas(p);
        i === 0 ? ctx.moveTo(cp.x, cp.y) : ctx.lineTo(cp.x, cp.y);
      });
      ctx.stroke();
    } else if (a.type === 'highlight') {
      const rc = toCanvas(a);
      const c = a.color;
      ctx.fillStyle = 'rgba(' + parseInt(c.slice(1,3),16) + ',' + parseInt(c.slice(3,5),16) + ',' + parseInt(c.slice(5,7),16) + ',0.25)';
      ctx.fillRect(rc.x, rc.y, rc.w, rc.h);
    } else if (a.type === 'text') {
      const tc = toCanvas(a);
      ctx.font = (a.size * 4) + 'px Inter, sans-serif';
      ctx.fillStyle = a.color;
      ctx.fillText(a.text, tc.x, tc.y);
    }
  });
}

// ===== Drawing on Annotation Canvas =====
const ac = $('annotCanvas');
const actx = ac.getContext('2d');

function getCanvasPos(e) {
  const rect = ac.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (ac.width / rect.width);
  const y = (e.clientY - rect.top) * (ac.height / rect.height);
  return { x: Math.max(0, Math.min(ac.width, x)), y: Math.max(0, Math.min(ac.height, y)) };
}

ac.addEventListener('mousedown', e => {
  if (!pdfDoc) return;
  const pos = getCanvasPos(e);
  const nPos = toNative(pos);
  lastX = pos.x; lastY = pos.y;

  if (currentTool === 'pan') {
    isPanning = true;
    dragStart = { x: e.clientX, y: e.clientY };
    ac.style.cursor = 'grabbing';
    return;
  }

  if (currentTool === 'pen') {
    isDrawing = true;
    annotations.push({ type: 'path', page: currentPage, color: currentColor, size: currentSize, points: [{ x: nPos.x, y: nPos.y }] });
    actx.beginPath();
    actx.strokeStyle = currentColor;
    actx.lineWidth = currentSize;
    actx.lineCap = 'round';
    actx.lineJoin = 'round';
    actx.moveTo(pos.x, pos.y);
    return;
  }

  if (currentTool === 'highlight') {
    isDrawing = true;
    dragStart = nPos;
    return;
  }

  if (currentTool === 'text') {
    showTextInput(nPos);
    return;
  }

  if (currentTool === 'erase') {
    const pageAnnots = getPageAnnotations();
    for (let i = pageAnnots.length - 1; i >= 0; i--) {
      const a = pageAnnots[i];
      if (a.type === 'path') {
        for (const p of a.points) {
          if (Math.hypot(p.x - nPos.x, p.y - nPos.y) < (currentSize * 3) / scale) {
            const idx = annotations.indexOf(a);
            if (idx >= 0) annotations.splice(idx, 1);
            redrawAnnotations();
            return;
          }
        }
      } else if (a.type === 'highlight') {
        if (nPos.x >= a.x && nPos.x <= a.x + a.w && nPos.y >= a.y && nPos.y <= a.y + a.h) {
          const idx = annotations.indexOf(a);
          if (idx >= 0) annotations.splice(idx, 1);
          redrawAnnotations();
          return;
        }
      } else if (a.type === 'text') {
        const tc = toCanvas(a);
        if (pos.x >= tc.x - 5 && pos.x <= tc.x + actx.measureText(a.text).width + 5 && pos.y >= tc.y - 16 && pos.y <= tc.y + 5) {
          const idx = annotations.indexOf(a);
          if (idx >= 0) annotations.splice(idx, 1);
          redrawAnnotations();
          return;
        }
      }
    }
    return;
  }
});

ac.addEventListener('mousemove', e => {
  if (!pdfDoc) return;
  const pos = getCanvasPos(e);
  const nPos = toNative(pos);

  if (currentTool === 'pan' && isPanning && dragStart) {
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    const viewer = $('viewer');
    viewer.scrollLeft -= dx;
    viewer.scrollTop -= dy;
    dragStart = { x: e.clientX, y: e.clientY };
    return;
  }

  if (currentTool === 'pen' && isDrawing) {
    const lastAnnot = annotations[annotations.length - 1];
    if (!lastAnnot || lastAnnot.type !== 'path') return;
    lastAnnot.points.push({ x: nPos.x, y: nPos.y });
    actx.lineTo(pos.x, pos.y);
    actx.stroke();
    actx.beginPath();
    actx.moveTo(pos.x, pos.y);
    return;
  }

  if (currentTool === 'highlight' && isDrawing && dragStart) {
    const ctx = $('annotCanvas').getContext('2d');
    redrawAnnotations();
    const c = currentColor;
    ctx.fillStyle = 'rgba(' + parseInt(c.slice(1,3),16) + ',' + parseInt(c.slice(3,5),16) + ',' + parseInt(c.slice(5,7),16) + ',0.25)';
    const w = (pos.x - toCanvas(dragStart).x);
    const h = (pos.y - toCanvas(dragStart).y);
    ctx.fillRect(toCanvas(dragStart).x, toCanvas(dragStart).y, w, h);
    lastX = pos.x; lastY = pos.y;
    return;
  }
});

function acEnd() {
  if (currentTool === 'highlight' && isDrawing && dragStart) {
    const pos = { x: lastX, y: lastY };
    const nEnd = toNative(pos);
    const w = nEnd.x - dragStart.x;
    const h = nEnd.y - dragStart.y;
    if (Math.abs(w) > 2/scale || Math.abs(h) > 2/scale) {
      annotations.push({ type: 'highlight', page: currentPage, color: currentColor, x: Math.min(dragStart.x, nEnd.x), y: Math.min(dragStart.y, nEnd.y), w: Math.abs(w), h: Math.abs(h) });
    }
  }
  isDrawing = false;
  isPanning = false;
  dragStart = null;
  if (currentTool === 'pan') ac.style.cursor = 'grab';
  redrawAnnotations();
}

ac.addEventListener('mouseup', acEnd);
ac.addEventListener('mouseleave', acEnd);

// Touch support
ac.addEventListener('touchstart', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const me = new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY });
  ac.dispatchEvent(me);
}, { passive: false });

ac.addEventListener('touchmove', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const me = new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY });
  ac.dispatchEvent(me);
}, { passive: false });

ac.addEventListener('touchend', e => {
  e.preventDefault();
  acEnd();
}, { passive: false });

// ===== Text Input Overlay =====
function showTextInput(nPos) {
  if (textInput) textInput.remove();
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'text-input-overlay';
  const tc = toCanvas(nPos);
  input.style.cssText = 'position:absolute;background:transparent;border:none;border-bottom:1px solid ' + currentColor + ';color:' + currentColor + ';font-family:Inter,sans-serif;font-size:' + (currentSize * 2) + 'px;outline:none;left:' + tc.x + 'px;top:' + tc.y + 'px;z-index:10;min-width:50px;caret-color:' + currentColor;
  input.placeholder = 'Type...';
  const container = $('pageContainer');
  container.appendChild(input);
  input.focus();
  textInput = input;
  input.addEventListener('blur', () => {
    if (input.value.trim()) {
      annotations.push({ type: 'text', page: currentPage, color: currentColor, size: currentSize, text: input.value, x: nPos.x, y: nPos.y });
      redrawAnnotations();
    }
    input.remove();
    textInput = null;
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur() }
    if (e.key === 'Escape') { input.remove(); textInput = null }
  });
}

// ===== Save as PDF =====
$('btnSave').addEventListener('click', () => {
  if (!pdfDoc) return;
  if (typeof PDFLib === 'undefined') {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js';
    script.onload = savePDF;
    document.head.appendChild(script);
    return;
  }
  savePDF();
});

function savePDF() {
  const { PDFDocument, rgb, StandardFonts } = PDFLib;
  $('loading').classList.add('show');

  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const pdfDoc2 = await PDFDocument.load(e.target.result, { ignoreEncryption: true });
      const pages = pdfDoc2.getPages();
      const font = await pdfDoc2.embedFont(StandardFonts.Helvetica);

      const annotByPage = {};
      annotations.forEach(a => {
        if (!annotByPage[a.page]) annotByPage[a.page] = [];
        annotByPage[a.page].push(a);
      });

      for (const pageNumStr in annotByPage) {
        const pn = parseInt(pageNumStr) - 1;
        if (pn < 0 || pn >= pages.length) continue;
        const page = pages[pn];
        const { width, height } = page.getSize();
        const pageAnnots = annotByPage[pageNumStr];

        for (const a of pageAnnots) {
          const x = (a.x || 0);
          const y = height - (a.y || 0);

          if (a.type === 'path' && a.points && a.points.length > 1) {
            const color = hexToRgb(a.color || '#E8C04A');
            for (let i = 1; i < a.points.length; i++) {
              const p1 = a.points[i - 1];
              const p2 = a.points[i];
              if (!p1 || !p2) continue;
              page.drawLine({
                start: { x: p1.x, y: height - p1.y },
                end: { x: p2.x, y: height - p2.y },
                color: rgb(color.r, color.g, color.b),
                thickness: (a.size || 3) * 0.15,
                opacity: 0.8,
              });
            }
          }

          if (a.type === 'highlight') {
            const color = hexToRgb(a.color || '#E8C04A');
            page.drawRectangle({
              x: (a.x || 0),
              y: height - ((a.y || 0) + (a.h || 20)),
              width: (a.w || 50),
              height: (a.h || 20),
              color: rgb(color.r, color.g, color.b),
              opacity: 0.25,
            });
          }

          if (a.type === 'text' && a.text) {
            page.drawText(a.text, {
              x: x,
              y: y - 4,
              size: (a.size || 3) * 0.8,
              font: font,
              color: rgb(0.91, 0.75, 0.29),
            });
          }
        }
      }

      const pdfBytes = await pdfDoc2.save();
      const blob = new Blob([pdfBytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName.replace('.pdf', '') + '_edited.pdf';
      a.click();
      URL.revokeObjectURL(url);
      $('loading').classList.remove('show');
    } catch (err) {
      $('loading').classList.remove('show');
      alert('Save failed: ' + err.message);
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(pdfData);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16) / 255;
  const g = parseInt(hex.slice(3, 5), 16) / 255;
  const b = parseInt(hex.slice(5, 7), 16) / 255;
  return { r, g, b };
}

// ===== Print =====
$('btnPrint').addEventListener('click', () => {
  if (!pdfDoc) return;
  const win = window.open('', '_blank');
  if (!win) {
    // Popup blocked fallback: render inline and use the browser's built-in print
    const blob = new Blob([pdfData], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    a.target = '_blank';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    return;
  }
  win.document.write('<html><head><title>Print: ' + fileName + '</title><style>body{margin:0}canvas{display:block;width:100%}</style></head><body>');
  const renderAll = async () => {
    for (let i = 1; i <= totalPages; i++) {
      try {
        const page = await pdfDoc.getPage(i);
        const vp = page.getViewport({ scale: 1.5 });
        const c = document.createElement('canvas');
        c.width = vp.width; c.height = vp.height;
        await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
        win.document.body.appendChild(c);
      } catch(e) { /* skip page on render error */ }
    }
    win.document.write('</body></html>');
    win.document.close();
    setTimeout(() => { try { win.print(); } catch(e) { /* popup may be closed */ } }, 500);
  };
  renderAll();
});

// ===== Open new =====
$('btnOpen').addEventListener('click', () => fileInput.click());
