<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TP-96 / Projects</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;
  --card:#141312;
  --card-edge:#22201c;
  --card-hover:#1c1a16;
  --gold:#E8C04A;
  --gold-dim:#9a7528;
  --orange:#FF6A1A;
  --green:#8fe89a;
  --text:#f0ede8;
  --text-dim:#b8b2a5;
  --text-deep:#6b6555;
  --font-head:'Bebas Neue',sans-serif;
  --font-display:'Share Tech Mono',monospace;
  --font-body:'Inter',sans-serif;
}
html{height:100%}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  min-height:100%;
  -webkit-tap-highlight-color:transparent;
}
a{color:var(--gold);text-decoration:none}
a:hover{color:var(--orange)}

.hub{max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem}
.hub-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:1rem;border-bottom:1px solid var(--card-edge);margin-bottom:1.5rem;flex-wrap:wrap;gap:.5rem}
.hub-logo{font-family:var(--font-head);font-size:1.6rem;color:var(--gold);letter-spacing:.12em;line-height:1}
.hub-logo span{color:var(--text-deep);font-family:var(--font-display);font-size:.55rem;letter-spacing:.08em;display:block;margin-top:.1rem}
.hub-nav{display:flex;gap:.25rem}
.hub-nav a{font-family:var(--font-display);font-size:.5rem;color:var(--text-deep);letter-spacing:.1em;border:1px solid var(--card-edge);padding:.25rem .5rem;transition:all .1s}
.hub-nav a:hover{color:var(--gold);border-color:var(--gold-dim)}

.badge{font-family:var(--font-display);font-size:.4rem;padding:.12rem .35rem;letter-spacing:.06em;display:inline-block;text-transform:uppercase}
.badge-live{color:var(--green);border:1px solid var(--green)}
.badge-wip{color:var(--gold);border:1px solid var(--gold-dim)}
.badge-plan{color:var(--text-deep);border:1px solid var(--text-deep)}
.badge-docs{color:var(--orange);border:1px solid var(--orange)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.75rem}
.card{
  background:var(--card);
  border:1px solid var(--card-edge);
  padding:1rem;
  cursor:pointer;
  transition:all .12s;
  position:relative;
  display:block;
  color:inherit;
}
.card:hover{
  background:var(--card-hover);
  border-color:var(--gold-dim);
  transform:translateY(-2px);
}
.card:active{transform:scale(.98)}
.card h3{font-family:var(--font-head);font-size:1rem;color:var(--text);letter-spacing:.08em;margin-bottom:.25rem}
.card p{font-size:.6rem;color:var(--text-dim);line-height:1.4;margin-bottom:.5rem}
.card .tags{display:flex;flex-wrap:wrap;gap:.2rem;margin-top:.4rem}
.card .tags span{
  font-family:var(--font-display);
  font-size:.35rem;
  padding:.08rem .25rem;
  border:1px solid var(--card-edge);
  color:var(--text-deep);
  letter-spacing:.04em;
}
.card .arrow{
  position:absolute;bottom:.6rem;right:.7rem;
  font-family:var(--font-display);font-size:.5rem;
  color:var(--gold-dim);transition:all .1s;
}
.card:hover .arrow{color:var(--gold);transform:translateX(3px)}

@media(max-width:500px){
  .hub{padding:1rem .5rem 3rem}
  .hub-logo{font-size:1.2rem}
  .grid{grid-template-columns:1fr}
  .card{padding:.75rem}
  .card h3{font-size:.85rem}
}
</style>
</head>
<body>
<div class="hub">
  <div class="hub-header">
    <div class="hub-logo">TP-96 <span>project directory</span></div>
    <div class="hub-nav">
      <a href="https://t.poddar.net">PORTFOLIO</a>
      <a href="https://github.com/TP-96">GITHUB</a>
    </div>
  </div>
  <div class="grid" id="projectGrid"></div>
</div>

<script>
const projects = [
  {
    title: 'CX-3 Flight Computer',
    url: 'cx3.html',
    desc: 'Aviation calculator — TSD, Fuel, Wind, Alt, Conversions, W&B + 2D/3D graphing, quadratic/cubic solver. Full tactile calculator interface.',
    status: 'live',
    statusLabel: 'Live',
    tags: ['calculator', 'aviation', 'graphing', 'math']
  },
  {
    title: 'CAD File Viewer',
    url: 'cad.html',
    desc: 'Upload and inspect 3D CAD models (STL/STEP). Rotate, zoom, pan with solid or wireframe rendering.',
    status: 'wip',
    statusLabel: 'In Progress',
    tags: ['CAD', '3D', 'Three.js', 'STL']
  },
  {
    title: 'PDF Viewer & Editor',
    url: 'pdf.html',
    desc: 'Upload, view, annotate, and re-download PDFs. Draw, highlight, add text notes with adjustable color/brush size across multi-page documents.',
    status: 'wip',
    statusLabel: 'New',
    tags: ['PDF', 'annotations', 'editor', 'tools']
  },
  {
    title: 'Commands & Reference',
    url: 'commands.html',
    desc: 'Complete command reference for all CX-3 tools — calculator modes, keypad shortcuts, function row, graphing, PDF annotation tools, CAD navigation, keyboard shortcuts, and math function reference.',
    status: 'live',
    statusLabel: 'Docs',
    tags: ['reference', 'commands', 'help']
  },
  {
    title: 'Airplane Tracker',
    url: 'airplane.html',
    desc: 'Flight radar clone — live aircraft tracking, route visualization, and airport information overlay.',
    status: 'wip',
    statusLabel: 'In Progress',
    tags: ['aviation', 'maps', 'real-time']
  },
  {
    title: 'HORIZON Mission Control',
    url: 'horizon.html',
    desc: 'Interactive avionics HUD — animated radar, attitude indicator, arc gauges, compass rose, starfield, real weather data from Open-Meteo, system status panel, and scrolling mission terminal. CRT scanline effect.',
    status: 'live',
    statusLabel: 'Live',
    tags: ['HUD', 'aviation', 'canvas', 'weather', 'data-viz']
  },
  {
    title: 'PDF → PNG Converter',
    url: 'pdf2png.html',
    desc: 'Render PDF pages to PNG images entirely in your browser. Supports custom DPI (1×–6×), page range selection, individual downloads, and ZIP batch export. Zero uploads — all local via pdf.js.',
    status: 'live',
    statusLabel: 'Live',
    tags: ['PDF', 'converter', 'PNG', 'tools']
  },
  {
    title: 'ATCSIM — Air Traffic Control',
    url: 'atc.html',
    desc: 'Real-time ATC simulator. Click to select aircraft, drag to vector, set headings/altitudes/speeds, guide planes to approach. Collision avoidance, progressive difficulty, score system, hold patterns. Elegant radar display.',
    status: 'live',
    statusLabel: 'Live',
    tags: ['game', 'ATC', 'simulation', 'canvas', 'aviation']
  }
];

const grid = document.getElementById('projectGrid');
grid.innerHTML = projects.map(p => `
  <a href="${p.url}" class="card">
    <h3>${p.title}</h3>
    <p>${p.desc}</p>
    <div class="tags">
      <span class="badge badge-${p.status}">${p.statusLabel}</span>
      ${p.tags.map(t => `<span>${t}</span>`).join('')}
    </div>
    <span class="arrow">→</span>
  </a>
`).join('');
</script>
</body>
</html>
