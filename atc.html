<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ATCSIM v2 — Air Traffic Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
    }
    body {
      font-family: 'Share Tech Mono', monospace;
      background: linear-gradient(135deg, #0a0a0a 0%, #0d0d1a 40%, #1a1a2e 100%);
      color: #00ff00;
      display: flex;
      flex-direction: column;
      position: relative;
      min-height: 100vh;
    }

    /* ── Loading Screen ── */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }
    .loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loading-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      color: #00ff00;
      letter-spacing: 0.25em;
      margin-bottom: 2rem;
      text-shadow: 0 0 30px rgba(0,255,0,0.4);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .loading-bar {
      width: 320px;
      height: 4px;
      background: #1a1a1a;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .loading-bar::after {
      content: '';
      position: absolute;
      top: 0; left: -320px;
      width: 320px;
      height: 100%;
      background: linear-gradient(90deg, transparent, #00ff00, #00ff66, transparent);
      animation: sweep 1.8s ease-in-out infinite;
    }
    @keyframes sweep {
      0%   { left: -320px; }
      100% { left: 100%; }
    }
    .loading-sub {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #446644;
      letter-spacing: 0.1em;
    }

    /* ── Navigation Bar ── */
    .nav-bar {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 0.7rem 1.5rem;
      background: rgba(0,255,0,0.03);
      border-bottom: 1px solid rgba(0,255,0,0.15);
      flex-shrink: 0;
      z-index: 100;
      flex-wrap: wrap;
    }
    .nav-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: #00ff00;
      letter-spacing: 0.12em;
      text-shadow: 0 0 15px rgba(0,255,0,0.3);
    }
    .nav-title small {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: #446644;
      letter-spacing: 0;
      margin-left: 0.3rem;
    }
    .nav-bar a {
      color: #446644;
      text-decoration: none;
      font-size: 0.8rem;
      transition: color 0.2s;
    }
    .nav-bar a:hover { color: #00ff00; }
    .nav-status {
      margin-left: auto;
      font-size: 0.75rem;
      color: #335533;
    }

    /* ── HUD Bar ── */
    .hud-bar {
      display: flex;
      justify-content: center;
      gap: 1.8rem;
      padding: 0.6rem 1.5rem;
      background: rgba(0,0,0,0.85);
      border-bottom: 1px solid rgba(0,255,0,0.1);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .hud-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 1rem;
    }
    .hud-label {
      color: #446644;
      text-transform: uppercase;
      font-size: 0.75rem;
    }
    .hud-value {
      color: #00ff00;
      font-weight: bold;
      font-size: 1.1rem;
    }
    .hud-value.warn { color: #ff4444; }
    .hud-sep { color: #223322; font-size: 1.2rem; }

    /* ── Canvas Container ── */
    .game-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none;
    }

    /* ── Selection Info Panel ── */
    .sel-panel {
      position: absolute;
      top: 0.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: none;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem 1.2rem;
      background: rgba(0,0,0,0.92);
      border: 1px solid #00ff00;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0,255,0,0.15);
      font-size: 0.8rem;
      white-space: nowrap;
      pointer-events: auto;
    }
    .sel-panel.visible { display: flex; flex-wrap: wrap; justify-content: center; }
    .sel-panel .sp-lbl { color: #446644; }
    .sel-panel .sp-val { color: #00ff00; font-weight: bold; margin-right: 0.5rem; }

    /* ── Command Panel ── */
    .cmd-panel {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1rem;
      background: rgba(0,0,0,0.9);
      border: 1px solid rgba(0,255,0,0.3);
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,255,0,0.1);
    }
    .cmd-panel.visible { display: flex; }
    .cmd-row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
    .cmd-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      padding: 0.4rem 0.9rem;
      border: 1px solid #00ff00;
      background: rgba(0,255,0,0.08);
      color: #00ff00;
      cursor: pointer;
      transition: all 0.15s;
      border-radius: 5px;
      font-weight: bold;
    }
    .cmd-btn:hover {
      background: rgba(0,255,0,0.2);
      box-shadow: 0 0 12px rgba(0,255,0,0.25);
      transform: translateY(-1px);
    }
    .cmd-btn:active { transform: translateY(0); }
    .cmd-btn.cyan  { border-color: #00ffff; color: #00ffff; }
    .cmd-btn.cyan:hover  { background: rgba(0,255,255,0.2); box-shadow: 0 0 12px rgba(0,255,255,0.25); }
    .cmd-btn.red   { border-color: #ff4444; color: #ff4444; }
    .cmd-btn.red:hover   { background: rgba(255,68,68,0.2); box-shadow: 0 0 12px rgba(255,68,68,0.25); }
    .cmd-btn.gold  { border-color: #ffcc00; color: #ffcc00; }
    .cmd-btn.gold:hover  { background: rgba(255,204,0,0.2); box-shadow: 0 0 12px rgba(255,204,0,0.25); }
    .cmd-sep {
      width: 1px;
      height: 1.6rem;
      background: rgba(0,255,0,0.2);
    }

    /* ── Radio Log ── */
    .radio-log {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      z-index: 40;
      width: min(300px, 45vw);
      max-height: 200px;
      overflow-y: auto;
      background: rgba(0,0,0,0.88);
      border: 1px solid rgba(0,255,0,0.2);
      padding: 0.5rem;
      border-radius: 6px;
      font-size: 0.75rem;
      pointer-events: auto;
    }
    .radio-log::-webkit-scrollbar { width: 3px; }
    .radio-log::-webkit-scrollbar-track { background: #111; }
    .radio-log::-webkit-scrollbar-thumb { background: #335533; border-radius: 2px; }
    .radio-msg {
      padding: 0.3rem 0.5rem;
      margin-bottom: 0.3rem;
      border-left: 2px solid #00ff00;
      background: rgba(0,255,0,0.03);
      border-radius: 3px;
      animation: fadeInMsg 0.25s ease;
    }
    @keyframes fadeInMsg {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .radio-msg.info { border-color: #00ff00; color: #88ff88; }
    .radio-msg.err  { border-color: #ff4444; color: #ff6666; }
    .radio-msg.done { border-color: #00ffff; color: #66ffff; }

    /* ── Combo Display ── */
    .combo-popup {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .combo-popup.show { opacity: 1; }
    .combo-main {
      font-size: 2.5rem;
      font-weight: bold;
      color: #00ff00;
      text-shadow: 0 0 40px rgba(0,255,0,0.6);
    }
    .combo-sub {
      font-size: 1rem;
      color: #88ff88;
      margin-top: 0.2rem;
    }

    /* ── Event Popup ── */
    .event-popup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 60;
      background: rgba(0,0,0,0.92);
      border: 1px solid #00ff00;
      padding: 1.5rem 2.5rem;
      border-radius: 10px;
      text-align: center;
      font-size: 1.3rem;
      color: #00ff00;
      box-shadow: 0 0 30px rgba(0,255,0,0.2);
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }
    .event-popup.show { opacity: 1; }

    /* ── Overlay (win/lose) ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      animation: overlayIn 0.4s ease;
    }
    @keyframes overlayIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .overlay-box {
      text-align: center;
      padding: 2.5rem;
      background: rgba(0,0,0,0.9);
      border: 1px solid #00ff00;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(0,255,0,0.15);
    }
    .overlay-icon { font-size: 3.5rem; margin-bottom: 0.5rem; }
    .overlay-title { font-size: 2rem; margin-bottom: 1rem; }
    .overlay-score { font-size: 1.3rem; margin-bottom: 0.5rem; color: #88ff88; }
    .overlay-combo { font-size: 1rem; margin-bottom: 1.5rem; color: #446644; }
    .overlay-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.1rem;
      padding: 0.7rem 2rem;
      border: 1px solid #00ff00;
      background: rgba(0,255,0,0.1);
      color: #00ff00;
      cursor: pointer;
      border-radius: 6px;
      font-weight: bold;
      transition: all 0.2s;
    }
    .overlay-btn:hover {
      background: rgba(0,255,0,0.25);
      box-shadow: 0 0 20px rgba(0,255,0,0.3);
    }
    .overlay-btn.lose { border-color: #ff4444; color: #ff4444; }
    .overlay-btn.lose:hover { background: rgba(255,68,68,0.25); box-shadow: 0 0 20px rgba(255,68,68,0.3); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .nav-bar { padding: 0.5rem 0.8rem; gap: 0.8rem; }
      .nav-title { font-size: 1.4rem; }
      .nav-bar a { font-size: 0.7rem; }
      .hud-bar { gap: 0.8rem; padding: 0.4rem 0.8rem; }
      .hud-item { font-size: 0.8rem; }
      .radio-log { width: 50vw; max-height: 150px; font-size: 0.65rem; }
      .sel-panel { font-size: 0.7rem; padding: 0.4rem 0.8rem; gap: 0.5rem; }
      .cmd-btn { font-size: 0.75rem; padding: 0.3rem 0.7rem; }
      .combo-main { font-size: 1.8rem; }
    }

    /* ── Tooltip hint ── */
    .hint {
      position: absolute;
      bottom: 4.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      font-size: 0.75rem;
      color: #335533;
      background: rgba(0,0,0,0.7);
      padding: 0.3rem 1rem;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
    }
    .hint.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- ─── Loading Screen ─── -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-text">◈ ATCSIM v2</div>
    <div class="loading-bar"></div>
    <div class="loading-sub">Initializing radar systems ...</div>
  </div>

  <!-- ─── Navigation ─── -->
  <div class="nav-bar">
    <span class="nav-title">◈ ATCSIM <small>v2</small></span>
    <a href="https://tp-96.github.io/cx3/" target="_blank">↩ CX-3 HUB</a>
    <a href="https://tp-96.github.io/Track/" target="_blank">💰 TRACKER</a>
    <a href="https://tp-96.github.io/cx3/planner/" target="_blank">📋 PLANNER</a>
    <span class="nav-status" id="navStatus">RADAR STANDBY</span>
  </div>

  <!-- ─── HUD ─── -->
  <div class="hud-bar" id="hudBar">
    <div class="hud-item">
      <span class="hud-label">SCORE</span>
      <span class="hud-value" id="hudScore">0</span>
    </div>
    <span class="hud-sep">│</span>
    <div class="hud-item">
      <span class="hud-label">COMBO</span>
      <span class="hud-value" id="hudCombo">×1</span>
    </div>
    <span class="hud-sep">│</span>
    <div class="hud-item">
      <span class="hud-label">TRAFFIC</span>
      <span class="hud-value" id="hudTraffic">0</span>
    </div>
    <span class="hud-sep">│</span>
    <div class="hud-item">
      <span class="hud-label">MISSING</span>
      <span class="hud-value warn" id="hudMissing">3</span>
    </div>
    <span class="hud-sep">│</span>
    <div class="hud-item">
      <span class="hud-label">LEVEL</span>
      <span class="hud-value" id="hudLevel">1</span>
    </div>
  </div>

  <!-- ─── Game Area ─── -->
  <div class="game-area" id="gameArea">
    <canvas id="gameCanvas"></canvas>

    <!-- Selection info -->
    <div class="sel-panel" id="selPanel">
      <span><span class="sp-lbl">CALL:</span> <span class="sp-val" id="selCall">---</span></span>
      <span><span class="sp-lbl">ALT:</span> <span class="sp-val" id="selAlt">---</span></span>
      <span><span class="sp-lbl">SPD:</span> <span class="sp-val" id="selSpd">---</span></span>
      <span><span class="sp-lbl">HDG:</span> <span class="sp-val" id="selHdg">---°</span></span>
      <span><span class="sp-lbl">TYPE:</span> <span class="sp-val" id="selType">---</span></span>
      <span><span class="sp-lbl">RWY:</span> <span class="sp-val" id="selRwy">---</span></span>
    </div>

    <!-- Command panel -->
    <div class="cmd-panel" id="cmdPanel">
      <div class="cmd-row">
        <button class="cmd-btn" id="btnStart">▶ START</button>
        <button class="cmd-btn cyan" id="btnApproach">▽ APPROACH</button>
        <button class="cmd-btn" id="btnHold">◯ HOLD</button>
        <button class="cmd-btn red" id="btnEmergency">⚠ EMERG</button>
        <span class="cmd-sep"></span>
        <button class="cmd-btn gold" id="btnReset">↺ RESET</button>
      </div>
    </div>

    <!-- Radio log -->
    <div class="radio-log" id="radioLog"></div>

    <!-- Combo popup -->
    <div class="combo-popup" id="comboPopup">
      <div class="combo-main" id="comboMain">+0</div>
      <div class="combo-sub" id="comboSub"></div>
    </div>

    <!-- Event popup -->
    <div class="event-popup" id="eventPopup"></div>

    <!-- Hint -->
    <div class="hint" id="hint">Click an aircraft to select · Drag to vector · ▷ START</div>
  </div>

<script>
/* ===================================================================
 *  ATCSIM v2 — Full Air Traffic Control Simulation
 *  Single-file, zero-dependency, self-contained HTML5 game.
 * =================================================================== */

/* ── Defensive: ensure console exists ── */
if (!window.console) { window.console = { log: function(){}, error: function(){}, warn: function(){} }; }

/* ═══════════════════════════════════════════════════════════════════
 *  CONSTANTS & CONFIGURATION
 * ═══════════════════════════════════════════════════════════════════ */

const CONFIG = Object.freeze({
  VERSION:              '2.0',
  GAME_DURATION:        120,           // seconds per round
  INITIAL_MISSING:      3,             // planes that can be lost
  COMBO_WINDOW:         4,             // seconds to maintain combo
  SPAWN_INTERVAL_MIN:   3.5,           // seconds between spawns (at level 1)
  SPAWN_INTERVAL_DECAY: 0.2,           // reduction per level
  MIN_SPAWN_INTERVAL:   1.2,
  MAX_CONCURRENT:       8,
  MISSING_PENALTY:      100,
  EMERGENCY_PENALTY:    200,
  EMERGENCY_TIMEOUT:    8,
  LEVEL_UP_SCORE_BASE:  600,
  LEVEL_UP_SCORE_INC:   400,
  RUNWAY_CAPTURE_DIST:  30,            // px to snap landing
  COLLISION_DIST:       35,            // separation minimum
  LEARN_PHASE_DURATION: 3,             // seconds of no-spawn intro

  AIRPORT_NAME: 'Ottawa Macdonald-Cartier',
  ICAO: 'CYOW',
});

const CALLSIGNS = [
  'ACA','WJA','Rouge','Jazz','SWA','DAL','UAL','AAL','JBU',
  'FDX','UPS','BAW','AFR','KLM','QFA','CPA','CES','SIA',
  'ANA','JAL','THY','UAE','ETD','EVA','MAS','NKS','FFT','ASA','SKW','RPA'
];
const AIRCRAFT_TYPES = Object.freeze({
  heavy: {
    name:      'Commercial Jet',
    speedR:    [380, 510],
    altR:      [25000, 37000],
    radius:    24,
    turnRate:  1.0,
    score:     150,
    color:     '#ff6666',
    trailCol:  'rgba(255,102,102,0.25)',
  },
  medium: {
    name:      'Regional Jet',
    speedR:    [240, 340],
    altR:      [18000, 28000],
    radius:    20,
    turnRate:  1.3,
    score:     100,
    color:     '#ffff66',
    trailCol:  'rgba(255,255,102,0.25)',
  },
  light: {
    name:      'Business Jet',
    speedR:    [140, 240],
    altR:      [8000, 15000],
    radius:    14,
    turnRate:  1.6,
    score:     75,
    color:     '#66ff66',
    trailCol:  'rgba(102,255,102,0.25)',
  }
});
const TYPE_KEYS = Object.keys(AIRCRAFT_TYPES);

/* ── Runway definitions in normalized [0..1] space ── */
const RUNWAY_DEFS = [
  { name:'RWY 07/25', nx:0.50, ny:0.88, w:0.08, h:0.012, angle:0 },
  { name:'RWY 14/32', nx:0.50, ny:0.10, w:0.08, h:0.012, angle:0 },
  { name:'RWY 18/36', nx:0.90, ny:0.50, w:0.012, h:0.08, angle:0 },
];

/* ═══════════════════════════════════════════════════════════════════
 *  MATH HELPERS
 * ═══════════════════════════════════════════════════════════════════ */

function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

function hdgTo(x1, y1, x2, y2) {
  return (Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI + 360) % 360;
}

function hdgDiff(a, b) {
  let d = ((b - a) % 360 + 540) % 360 - 180;
  return d;
}

function wrapHeading(h) { return ((h % 360) + 360) % 360; }

function rand(min, max) { return Math.random() * (max - min) + min; }

function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

function randItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

/* ═══════════════════════════════════════════════════════════════════
 *  DOM HELPERS
 * ═══════════════════════════════════════════════════════════════════ */

function $(id) { return document.getElementById(id); }

function setText(el, text) { if (el) el.textContent = text; }

/* ═══════════════════════════════════════════════════════════════════
 *  GAME STATE
 * ═══════════════════════════════════════════════════════════════════ */

let W = 800, H = 600;
let canvas, ctx;
let lastTime = 0;
let animFrameId = null;
let acIdCounter = 0;

let G = null; // game state, built by initGame()

/* ═══════════════════════════════════════════════════════════════════
 *  AIRCRAFT CONSTRUCTOR
 * ═══════════════════════════════════════════════════════════════════ */

function Aircraft() {
  this.id = ++acIdCounter;
  this.callsign = randItem(CALLSIGNS) + randInt(100, 999);
  const tk = randItem(TYPE_KEYS);
  const t  = AIRCRAFT_TYPES[tk];

  this.typeKey     = tk;
  this.typeName    = t.name;
  this.color       = t.color;
  this.trailCol    = t.trailCol;
  this.radius      = t.radius;
  this.turnRate    = t.turnRate;
  this.baseScore   = t.score;

  this.baseSpeed   = rand(t.speedR[0], t.speedR[1]);
  this.speed       = this.baseSpeed;
  this.targetSpeed = this.baseSpeed;

  this.altitude    = rand(t.altR[0], t.altR[1]);
  this.targetAlt   = this.altitude;

  /* Spawn from one of 4 edges */
  const pad = 60;
  const side = randInt(0, 3);
  switch (side) {
    case 0: // left
      this.x = -pad;
      this.y = rand(pad, H - pad);
      this.heading = rand(-20, 20);
      break;
    case 1: // right
      this.x = W + pad;
      this.y = rand(pad, H - pad);
      this.heading = rand(160, 200);
      break;
    case 2: // top
      this.x = rand(pad, W - pad);
      this.y = -pad;
      this.heading = rand(70, 110);
      break;
    default: // bottom
      this.x = rand(pad, W - pad);
      this.y = H + pad;
      this.heading = rand(250, 290);
      break;
  }
  this.targetHdg = this.heading + rand(-25, 25);
  this.targetHdg = wrapHeading(this.targetHdg);

  /* Move aircraft slightly into the visible area so they don't appear at the edge */
  this.x += Math.cos(this.heading * Math.PI/180) * rand(40, 100);
  this.y += Math.sin(this.heading * Math.PI/180) * rand(40, 100);

  this.trail       = [];
  this.selected    = false;
  this.active      = true;
  this.landed      = false;
  this.holding     = false;
  this.approach    = false;
  this.targetRwy   = null;
  this.emergency   = null;
  this.emerTimer   = 0;
  this.emerCalled  = false;
  this.introAlpha  = 1;          // fades in over 1s
  this.holdAngle   = rand(0, Math.PI * 2);
}

/* ── Per-frame update ── */
Aircraft.prototype.update = function(dt) {
  if (!this.active || this.landed) return;
  if (G && G.paused) return;

  this.introAlpha = Math.max(0, this.introAlpha - dt * 2);

  /* Smooth speed & altitude transitions */
  this.speed     = lerp(this.speed, this.targetSpeed, clamp(dt * 2, 0, 1));
  this.altitude  = lerp(this.altitude, this.targetAlt, clamp(dt * 1.5, 0, 1));

  /* Heading logic */
  if (this.holding) {
    /* Hold pattern: orbit a point ahead */
    this.holdAngle += dt * this.turnRate * 0.6;
    this.targetSpeed = Math.min(this.targetSpeed, 200);
    this.targetHdg = wrapHeading(this.heading + this.turnRate * 60 * dt);
  } else if (this.approach && this.targetRwy) {
    /* Approach mode: fly toward runway threshold */
    const gx = this.targetRwy.cx, gy = this.targetRwy.cy;
    const d = dist(this.x, this.y, gx, gy);
    if (d < CONFIG.RUNWAY_CAPTURE_DIST) {
      this.land();
      return;
    }
    const desired = hdgTo(this.x, this.y, gx, gy);
    let diff = hdgDiff(this.heading, desired);
    const rate = this.turnRate * 2.5 * dt;
    this.targetHdg = this.heading + clamp(diff, -rate, rate);
    this.targetSpeed = clamp(this.baseSpeed * 0.45, 120, 200);
    this.targetAlt = lerp(this.targetAlt, 0, clamp(dt * 2, 0, 1));
  } else {
    /* Normal flight: turn toward target heading */
    let diff = hdgDiff(this.heading, this.targetHdg);
    const rate = this.turnRate * 150 * dt;
    if (Math.abs(diff) < rate) {
      /* Close enough: snap */
      this.heading = this.targetHdg;
    } else {
      this.targetHdg = wrapHeading(this.heading + Math.sign(diff) * rate);
    }
  }
  this.heading = wrapHeading(this.heading);

  /* Emergency countdown */
  if (this.emergency && !this.emerCalled) {
    this.emerTimer += dt;
    if (this.emerTimer > CONFIG.EMERGENCY_TIMEOUT) {
      this.emerCalled = true;
      radioLog(`[EMERGENCY] ${this.callsign} — ${this.emergency}! MAYDAY MAYDAY!`, 'err');
      showEvent(`${this.callsign} MAYDAY — ${this.emergency}`, 3.5, '#ff4444');
      if (G) {
        G.score = Math.max(0, G.score - CONFIG.EMERGENCY_PENALTY);
        updateHUD();
      }
    }
  }

  /* Move */
  const speedPx = this.speed * 0.004 * 60 * dt;
  this.x += Math.cos(this.heading * Math.PI/180) * speedPx;
  this.y += Math.sin(this.heading * Math.PI/180) * speedPx;

  /* Trail */
  this.trail.push({ x: this.x, y: this.y });
  if (this.trail.length > 50) this.trail.shift();

  /* Out of bounds = lost */
  const margin = -120;
  if (this.x < margin || this.x > W + margin || this.y < margin || this.y > H + margin) {
    if (this.active) {
      this.active = false;
      lostAircraft(this);
    }
  }
};

/* ── Land ── */
Aircraft.prototype.land = function() {
  if (this.landed || !this.active) return;
  this.landed = true;
  this.active = false;
  this.selected = false;
  scoreLanding(this);
};

/* ── Deselect ── */
Aircraft.prototype.deselect = function() {
  this.selected = false;
};

/* ═══════════════════════════════════════════════════════════════════
 *  CORE GAME LOGIC
 * ═══════════════════════════════════════════════════════════════════ */

function initGame() {
  acIdCounter = 0;
  G = {
    running:       false,
    paused:        false,
    gameOver:      false,
    aircraft:      [],
    runways:       [],
    score:         0,
    combo:         1,
    comboTimer:    0,
    missing:       CONFIG.INITIAL_MISSING,
    maxMissing:    CONFIG.INITIAL_MISSING,
    level:         1,
    gameTime:      0,
    learnTimer:    0,
    spawnTimer:    0,
    totalLanded:   0,
    totalLost:     0,
    bestCombo:     1,
    selected:      null,
  };

  generateRunways();
  setStatus('RADAR ONLINE — LEVEL 1');
  hideOverlay();
  updateHUD();
}

function generateRunways() {
  G.runways = RUNWAY_DEFS.map(def => ({
    name:  def.name,
    cx:    def.nx * W,
    cy:    def.ny * H,
    w:     def.w * W,
    h:     def.h * H,
  }));
}

function spawnAircraft() {
  if (G.aircraft.length >= CONFIG.MAX_CONCURRENT) return;
  const ac = new Aircraft();
  G.aircraft.push(ac);
  radioLog(`[INIT] ${ac.callsign} — ${ac.typeName} enters airspace`, 'info');
}

function lostAircraft(ac) {
  if (ac.landed || !ac.active) return;
  G.score = Math.max(0, G.score - CONFIG.MISSING_PENALTY);
  G.missing--;
  G.combo = 1;
  G.comboTimer = 0;
  G.totalLost++;
  radioLog(`[LOST] ${ac.callsign} — departed airspace`, 'err');
  if (G.selected === ac) deselectCurrent();
  updateHUD();

  if (G.missing <= 0) {
    endGame(false);
  }
}

function scoreLanding(ac) {
  if (!ac.active) return;

  let pts = ac.baseScore;
  if (ac.emergency) pts += 300;
  if (G.combo > 1) pts += Math.floor(pts * (G.combo - 1) * 0.5);

  G.score += pts;
  G.comboTimer = CONFIG.COMBO_WINDOW;
  G.combo++;
  if (G.combo > G.bestCombo) G.bestCombo = G.combo;
  G.totalLanded++;

  const rwyName = ac.targetRwy ? ac.targetRwy.name : 'RWY --';
  radioLog(`[LAND] ${ac.callsign} — ${rwyName}. Welcome to ${CONFIG.AIRPORT_NAME}.`, 'done');
  showCombo(`+${pts}`, `${ac.callsign} · ${ac.typeName} · ${rwyName}`);

  if (G.combo === 3) showEvent('×3 COMBO!', 1.5);
  else if (G.combo === 5) showEvent('×5 COMBO! 🔥', 1.8);
  else if (G.combo >= 10) showEvent('×10 COMBO! 💥 MEGA!', 2.5);

  /* Check level up */
  const levelThreshold = CONFIG.LEVEL_UP_SCORE_BASE + (G.level - 1) * CONFIG.LEVEL_UP_SCORE_INC;
  if (G.score >= levelThreshold) {
    G.level++;
    showEvent(`▲ LEVEL ${G.level} — Traffic increasing!`, 2.5, '#00ffff');
    setStatus(`LEVEL ${G.level} — ${G.aircraft.length} in sector`);
    /* Spawn extra traffic immediately */
    const extra = Math.min(G.level, 3);
    for (let i = 0; i < extra; i++) spawnAircraft();
  }

  deselectCurrent();
  updateHUD();
}

function deselectCurrent() {
  if (G.selected) G.selected.deselect();
  G.selected = null;
  $('selPanel').classList.remove('visible');
}

function updateHUD() {
  setText($('hudScore'),  G.score);
  setText($('hudCombo'),  G.combo > 1 ? `×${G.combo}` : '×1');
  setText($('hudTraffic'), G.aircraft.filter(a => a.active && !a.landed).length);
  setText($('hudMissing'), G.missing);
  setText($('hudLevel'),  G.level);
}

function setStatus(msg) {
  setText($('navStatus'), msg);
}

/* ═══════════════════════════════════════════════════════════════════
 *  SELECTION & VECTORING
 * ═══════════════════════════════════════════════════════════════════ */

function selectAircraftAt(mx, my) {
  if (!G || G.gameOver) return;
  deselectCurrent();
  /* Iterate reverse so top-most (visually later) picks first */
  for (let i = G.aircraft.length - 1; i >= 0; i--) {
    const a = G.aircraft[i];
    if (!a.active || a.landed || a.holding) continue;
    const hitDist = dist(a.x, a.y, mx, my);
    const threshold = Math.max(a.radius + 12, 18);
    if (hitDist < threshold) {
      a.selected = true;
      G.selected = a;
      showSelectionInfo(a);
      return;
    }
  }
}

function showSelectionInfo(a) {
  const panel = $('selPanel');
  setText($('selCall'), a.callsign);
  setText($('selAlt'),  `${Math.round(a.altitude / 100) * 100}ft`);
  setText($('selSpd'),  `${Math.round(a.speed)}kt`);
  setText($('selHdg'),  `${Math.round(a.heading)}°`);
  setText($('selType'), a.typeName);
  setText($('selRwy'),  a.targetRwy ? a.targetRwy.name : '--');
  panel.classList.add('visible');
}

function vectorAircraftTo(fromX, fromY, toX, toY) {
  if (!G || !G.selected || G.gameOver) return;
  const hdg = hdgTo(fromX, fromY, toX, toY);
  G.selected.targetHdg = hdg;
  G.selected.targetSpeed = Math.max(G.selected.targetSpeed, 220);
  /* Cancel approach if they were vectored away */
  if (G.selected.approach) {
    const gx = G.selected.targetRwy.cx, gy = G.selected.targetRwy.cy;
    if (dist(toX, toY, gx, gy) > CONFIG.RUNWAY_CAPTURE_DIST * 4) {
      G.selected.approach = false;
      G.selected.targetRwy = null;
    }
  }
  radioLog(`[VECTOR] ${G.selected.callsign} — turn to ${Math.round(hdg)}°`, 'info');
}

function setApproach() {
  if (!G || !G.selected || G.gameOver) return;
  /* Pick nearest runway */
  let bestRwy = null, bestDist = Infinity;
  for (const rwy of G.runways) {
    const d = dist(G.selected.x, G.selected.y, rwy.cx, rwy.cy);
    if (d < bestDist) { bestDist = d; bestRwy = rwy; }
  }
  G.selected.approach = true;
  G.selected.targetRwy = bestRwy;
  G.selected.holding = false;
  radioLog(`[APPROACH] ${G.selected.callsign} — cleared to ${bestRwy.name}`, 'done');
  showEvent(`${G.selected.callsign} cleared ${bestRwy.name}`, 1.5, '#00ffff');
}

function setHold() {
  if (!G || !G.selected || G.gameOver) return;
  G.selected.holding = !G.selected.holding;
  if (G.selected.holding) {
    G.selected.approach = false;
    G.selected.targetRwy = null;
    G.selected.targetSpeed = clamp(G.selected.speed, 140, 200);
    radioLog(`[HOLD] ${G.selected.callsign} — enter holding pattern`, 'info');
  } else {
    radioLog(`[HOLD] ${G.selected.callsign} — exit holding, resume normal`, 'info');
  }
}

function setEmergency() {
  if (!G || !G.selected || G.gameOver) return;
  if (!G.selected.emergency) {
    G.selected.emergency = 'LOW FUEL';
    radioLog(`[EMERG] ${G.selected.callsign} — LOW FUEL declared`, 'err');
    showEvent(`⚠ ${G.selected.callsign} LOW FUEL`, 2.5, '#ff4444');
  }
}

/* ═══════════════════════════════════════════════════════════════════
 *  COLLISION DETECTION
 * ═══════════════════════════════════════════════════════════════════ */

function checkCollisions() {
  const active = G.aircraft.filter(a => a.active && !a.landed && !a.holding);
  for (let i = 0; i < active.length; i++) {
    for (let j = i + 1; j < active.length; j++) {
      const a = active[i], b = active[j];
      const d = dist(a.x, a.y, b.x, b.y);
      if (d < CONFIG.COLLISION_DIST) {
        /* Both are destroyed */
        a.active = false; b.active = false;
        G.score = Math.max(0, G.score - CONFIG.MISSING_PENALTY * 2);
        G.missing = Math.max(0, G.missing - 2);
        G.combo = 1;
        G.comboTimer = 0;
        radioLog(`[CRASH] COLLISION: ${a.callsign} & ${b.callsign}!`, 'err');
        showEvent(`✖ COLLISION — ${a.callsign} & ${b.callsign}`, 4, '#ff4444');
        updateHUD();
        if (G.missing <= 0) endGame(false);
        return; // avoid iterating on stale state
      }
    }
  }
}

/* ═══════════════════════════════════════════════════════════════════
 *  GAME LOOP
 * ═══════════════════════════════════════════════════════════════════ */

function startGame() {
  if (G && G.running) return;
  hideOverlay();
  initGame();
  G.running = true;
  G.learnTimer = 0;
  G.spawnTimer = 2; // grace period before first spawn
  G.gameTime = 0;
  G.comboTimer = 0;
  /* Clear radio log */
  $('radioLog').innerHTML = '<div class="radio-msg info">[ATC] Ottawa Center online</div>';
  setStatus('SECTOR ACTIVE — LEVEL 1');
  showEvent('SECTOR ACTIVE', 2);
  $('hint').classList.remove('show');
  /* Spawn initial aircraft */
  spawnAircraft();
  spawnAircraft();
  updateHUD();
}

function endGame(won) {
  if (!G || G.gameOver) return;
  G.running = false;
  G.gameOver = true;
  deselectCurrent();
  if (won) {
    setStatus('SECTOR SAFE — ALL CLEAR');
  } else {
    setStatus('SECTOR CLOSED — TOO MANY MISSING');
  }
  showOverlay(won);
}

function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  let dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  dt = Math.min(dt, 0.05); // cap to avoid spiral of death

  if (G && G.running && !G.paused) {
    updateGame(dt);
  }
  render();
  animFrameId = requestAnimationFrame(gameLoop);
}

function updateGame(dt) {
  G.gameTime += dt;

  /* Learning phase — no spawns */
  G.learnTimer += dt;
  G.comboTimer = Math.max(0, G.comboTimer - dt);

  /* Spawn logic */
  const interval = Math.max(CONFIG.MIN_SPAWN_INTERVAL,
    CONFIG.SPAWN_INTERVAL_MIN - (G.level - 1) * CONFIG.SPAWN_INTERVAL_DECAY);
  G.spawnTimer -= dt;
  if (G.spawnTimer <= 0 && G.learnTimer > CONFIG.LEARN_PHASE_DURATION) {
    spawnAircraft();
    G.spawnTimer = interval + rand(-0.5, 0.5);
  }

  /* Update aircraft */
  for (const ac of G.aircraft) {
    ac.update(dt);
  }

  /* Collision check */
  checkCollisions();

  /* Combo decay */
  if (G.combo > 1 && G.comboTimer <= 0) {
    G.combo = 1;
    showEvent('Combo expired', 1.2);
  }

  /* Auto-respawn if traffic is zero */
  const activeCount = G.aircraft.filter(a => a.active && !a.landed).length;
  if (activeCount === 0 && G.learnTimer > 2 && G.missing > 0) {
    G.spawnTimer = 0;
  }

  updateHUD();
}

/* ═══════════════════════════════════════════════════════════════════
 *  RENDERER
 * ═══════════════════════════════════════════════════════════════════ */

function render() {
  ctx.fillStyle = '#020208';
  ctx.fillRect(0, 0, W, H);

  if (!G || !G.runways) return;

  /* ── Grid (radar rings) ── */
  ctx.strokeStyle = 'rgba(0,255,0,0.04)';
  ctx.lineWidth = 1;
  const centers = [
    { x: W*0.3, y: H*0.4 }, { x: W*0.7, y: H*0.3 }, { x: W*0.5, y: H*0.7 }
  ];
  for (const c of centers) {
    for (let r = 40; r < 300; r += 50) {
      ctx.beginPath();
      ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  /* ── Runway surfaces ── */
  for (const rwy of G.runways) {
    ctx.fillStyle = 'rgba(0,255,0,0.12)';
    ctx.fillRect(rwy.cx - rwy.w/2, rwy.cy - rwy.h/2, rwy.w, rwy.h);
    ctx.strokeStyle = 'rgba(0,255,0,0.35)';
    ctx.lineWidth = 1;
    ctx.strokeRect(rwy.cx - rwy.w/2, rwy.cy - rwy.h/2, rwy.w, rwy.h);
    /* Runway label */
    ctx.fillStyle = 'rgba(0,255,0,0.25)';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(rwy.name, rwy.cx, rwy.cy + 4);
  }

  /* ── Ground strip ── */
  ctx.fillStyle = 'rgba(0,255,0,0.02)';
  ctx.fillRect(0, H - 8, W, 8);

  /* ── Aircraft ── */
  for (const a of G.aircraft) {
    if (!a.active) continue;

    const alpha = a.landed ? 0.3 : (1 - a.introAlpha * 0.5);

    /* Trail */
    if (a.trail.length > 1 && a.active) {
      ctx.strokeStyle = a.trailCol || 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(a.trail[0].x, a.trail[0].y);
      for (let k = 1; k < a.trail.length; k++) {
        ctx.lineTo(a.trail[k].x, a.trail[k].y);
      }
      ctx.stroke();
    }

    /* Aircraft shape — triangle pointing in heading direction */
    const hdgRad = a.heading * Math.PI / 180;
    const r = a.radius;
    const tipX = a.x + Math.cos(hdgRad) * r * 1.3;
    const tipY = a.y + Math.sin(hdgRad) * r * 1.3;
    const leftX  = a.x + Math.cos(hdgRad + 2.3) * r;
    const leftY  = a.y + Math.sin(hdgRad + 2.3) * r;
    const rightX = a.x + Math.cos(hdgRad - 2.3) * r;
    const rightY = a.y + Math.sin(hdgRad - 2.3) * r;

    ctx.globalAlpha = alpha;

    /* Glow when selected */
    if (a.selected) {
      ctx.shadowColor = '#00ff00';
      ctx.shadowBlur = 18;
    }

    ctx.fillStyle = a.color;
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(leftX, leftY);
    ctx.lineTo(rightX, rightY);
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur = 0;

    /* Outline */
    ctx.strokeStyle = a.selected ? '#ffffff' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = a.selected ? 2 : 1;
    ctx.stroke();

    /* Callsign label */
    ctx.fillStyle = a.selected ? '#ffffff' : 'rgba(255,255,255,0.6)';
    ctx.font = a.selected ? 'bold 11px monospace' : '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(a.callsign, a.x, a.y - r - 10);

    /* Emergency indicator */
    if (a.emergency && !a.emerCalled) {
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 14px monospace';
      ctx.fillText('⚠', a.x, a.y - r - 26);
      /* Pulse ring */
      ctx.strokeStyle = `rgba(255,68,68,${0.3 + 0.3 * Math.sin(G.gameTime * 6)})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(a.x, a.y, r + 8 + Math.sin(G.gameTime * 4) * 3, 0, Math.PI * 2);
      ctx.stroke();
    }

    /* Approach indicator */
    if (a.approach && a.targetRwy) {
      ctx.strokeStyle = 'rgba(0,255,255,0.15)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 6]);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(a.targetRwy.cx, a.targetRwy.cy);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    ctx.globalAlpha = 1;
  }
}

/* ═══════════════════════════════════════════════════════════════════
 *  UI: LOG, EVENTS, COMBO, OVERLAYS
 * ═══════════════════════════════════════════════════════════════════ */

function radioLog(text, cls = 'info') {
  const log = $('radioLog');
  const msg = document.createElement('div');
  msg.className = `radio-msg ${cls}`;
  msg.textContent = text;
  log.insertBefore(msg, log.firstChild);
  while (log.children.length > 30) log.lastChild.remove();
}

function showEvent(text, duration = 2, color = '#00ff00') {
  const el = $('eventPopup');
  el.textContent = text;
  el.style.color = color;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration * 1000);
}

function showCombo(main, sub) {
  setText($('comboMain'), main);
  setText($('comboSub'), sub || '');
  $('comboPopup').classList.add('show');
  setTimeout(() => $('comboPopup').classList.remove('show'), 1500);
}

function showOverlay(won) {
  const existing = document.querySelector('.overlay');
  if (existing) existing.remove();

  const div = document.createElement('div');
  div.className = 'overlay';
  const icon  = won ? '✭' : '✖';
  const title = won ? 'SECTOR SAFE' : 'SECTOR CLOSED';
  const btnCls = won ? 'overlay-btn' : 'overlay-btn lose';
  const btnTxt = won ? '▶ PLAY AGAIN' : '↺ TRY AGAIN';

  div.innerHTML = `
    <div class="overlay-box">
      <div class="overlay-icon">${icon}</div>
      <div class="overlay-title">${title}</div>
      <div class="overlay-score">Score: ${G ? G.score : 0}</div>
      <div class="overlay-combo">Best Combo: ×${G ? G.bestCombo : 1} &middot; Landed: ${G ? G.totalLanded : 0}</div>
      <button class="${btnCls}" id="overlayRestartBtn">${btnTxt}</button>
    </div>
  `;
  document.body.appendChild(div);
  $('overlayRestartBtn').addEventListener('click', () => { hideOverlay(); startGame(); });
}

function hideOverlay() {
  const el = document.querySelector('.overlay');
  if (el) el.remove();
}

/* ═══════════════════════════════════════════════════════════════════
 *  INPUT HANDLING
 * ═══════════════════════════════════════════════════════════════════ */

let dragStart = null;

function setupInput() {
  /* ── Mouse ── */
  canvas.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width  / rect.width);
    const my = (e.clientY - rect.top)  * (canvas.height / rect.height);
    dragStart = { x: mx, y: my };
    selectAircraftAt(mx, my);
  });

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width  / rect.width);
    const my = (e.clientY - rect.top)  * (canvas.height / rect.height);
  });

  canvas.addEventListener('mouseup', (e) => {
    if (e.button !== 0 || !dragStart) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width  / rect.width);
    const my = (e.clientY - rect.top)  * (canvas.height / rect.height);
    const d = dist(dragStart.x, dragStart.y, mx, my);
    if (d > 10 && G && G.selected) {
      vectorAircraftTo(dragStart.x, dragStart.y, mx, my);
    }
    dragStart = null;
  });

  /* ── Touch ── */
  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const mx = (t.clientX - rect.left) * (canvas.width  / rect.width);
    const my = (t.clientY - rect.top)  * (canvas.height / rect.height);
    touchStart = { x: mx, y: my };
    selectAircraftAt(mx, my);
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (!touchStart) return;
    const touch = e.changedTouches[0];
    const rect = canvas.getBoundingClientRect();
    const mx = (touch.clientX - rect.left) * (canvas.width  / rect.width);
    const my = (touch.clientY - rect.top)  * (canvas.height / rect.height);
    const d = dist(touchStart.x, touchStart.y, mx, my);
    if (d > 10 && G && G.selected) {
      vectorAircraftTo(touchStart.x, touchStart.y, mx, my);
    }
    touchStart = null;
  }, { passive: false });

  /* ── Keyboard shortcuts ── */
  document.addEventListener('keydown', (e) => {
    if (e.key >= '1' && e.key <= '9') {
      const idx = parseInt(e.key) - 1;
      const active = G ? G.aircraft.filter(a => a.active && !a.landed) : [];
      if (idx < active.length) {
        const ac = active[idx];
        selectAircraftAt(ac.x, ac.y);
      }
    } else if (e.key === 'a' || e.key === 'A') {
      setApproach();
    } else if (e.key === 'h' || e.key === 'H') {
      setHold();
    } else if (e.key === 'e' || e.key === 'E') {
      setEmergency();
    } else if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      if (G && !G.running) startGame();
    }
  });
}

/* ═══════════════════════════════════════════════════════════════════
 *  BUTTON BINDINGS
 * ═══════════════════════════════════════════════════════════════════ */

function setupButtons() {
  $('btnStart').addEventListener('click', startGame);
  $('btnReset').addEventListener('click', () => {
    if (G && G.running) endGame(false);
    setTimeout(startGame, 300);
  });
  $('btnApproach').addEventListener('click', setApproach);
  $('btnHold').addEventListener('click', setHold);
  $('btnEmergency').addEventListener('click', setEmergency);
}

/* ═══════════════════════════════════════════════════════════════════
 *  RESIZE
 * ═══════════════════════════════════════════════════════════════════ */

function resizeCanvas() {
  const area = $('gameArea');
  const rect = area.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width  = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  W = canvas.width;
  H = canvas.height;
  ctx = canvas.getContext('2d');
  // apply any global scale if needed
  if (G && G.runways) {
    // Recalculate runway positions on new canvas size
    G.runways.forEach((rwy, i) => {
      const def = RUNWAY_DEFS[i];
      rwy.cx = def.nx * W;
      rwy.cy = def.ny * H;
      rwy.w  = def.w * W;
      rwy.h  = def.h * H;
    });
  }
}

/* ═══════════════════════════════════════════════════════════════════
 *  INITIALIZATION
 * ═══════════════════════════════════════════════════════════════════ */

function boot() {
  console.log(`ATCSIM v${CONFIG.VERSION} booting...`);

  canvas = $('gameCanvas');
  if (!canvas) { console.error('Canvas not found'); return; }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  setupInput();
  setupButtons();

  initGame();
  setStatus('RADAR STANDBY — press ▶ START');

  /* Start the render loop immediately so we see the radar background */
  requestAnimationFrame(gameLoop);

  /* Fade out loading screen after a brief pause */
  setTimeout(() => {
    $('loadingScreen').classList.add('fade-out');
    /* Show hint */
    setTimeout(() => $('hint').classList.add('show'), 600);
  }, 1200);

  console.log(`ATCSIM v${CONFIG.VERSION} ready.`);
}

/* ── Kick off on DOMContentLoaded ── */
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
</script>
</body>
